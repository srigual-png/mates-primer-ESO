<style>
:root{--bg:#f4f7fc;--card:#fff;--primary:#5b8dee;--pd:#3a6fd8;--ok:#2ecc71;--err:#e74c3c;--warn:#f39c12;--text:#2c3e50;--muted:#7f8c9a;--border:#dce3ed;--sh:0 2px 14px rgba(0,0,0,0.07);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
nav{background:var(--card);border-bottom:1px solid var(--border);padding:13px 24px;display:flex;align-items:center;gap:12px;box-shadow:var(--sh);position:sticky;top:0;z-index:100;}
nav h1{font-size:1rem;font-weight:700;color:var(--primary);flex:1;}
.screen{display:none;padding:24px;max-width:720px;margin:0 auto;}
.screen.active{display:block;}
/* HOME */
.hh{text-align:center;padding:30px 0 20px;}
.hh h2{font-size:1.8rem;color:var(--primary);margin-bottom:6px;}
.hh p{color:var(--muted);font-size:.92rem;}
.cats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px;}
.cat{background:var(--card);border:2px solid var(--border);border-radius:16px;padding:20px 16px;cursor:pointer;text-align:center;transition:all .18s;box-shadow:var(--sh);}
.cat:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:0 6px 20px rgba(91,141,238,.15);}
.cat.active-cat{border-color:var(--primary);background:#eaf1fd;}
.cat-icon{font-size:2rem;margin-bottom:8px;}
.cat h3{font-size:.93rem;font-weight:700;margin-bottom:4px;}
.cat p{font-size:.75rem;color:var(--muted);}
.cfg-row{display:flex;gap:10px;margin-top:16px;}
.cfg-btn{flex:1;padding:10px;border:2px solid var(--border);border-radius:10px;background:var(--card);cursor:pointer;font-size:.85rem;font-weight:600;color:var(--muted);transition:all .18s;text-align:center;}
.cfg-btn.sel{border-color:var(--primary);color:var(--primary);background:#eaf1fd;}
.start-btn{width:100%;margin-top:18px;padding:15px;background:var(--primary);color:white;border:none;border-radius:14px;font-size:1rem;font-weight:700;cursor:pointer;transition:background .2s;}
.start-btn:hover{background:var(--pd);}
/* PROBLEM SCREEN */
.prog-bar-wrap{height:6px;background:var(--border);border-radius:3px;margin-bottom:18px;}
.prog-bar{height:6px;background:var(--primary);border-radius:3px;transition:width .4s;}
.prob-meta{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:.8rem;color:var(--muted);}
.badge{padding:3px 10px;border-radius:20px;font-weight:700;font-size:.72rem;}
.b-cat{background:#eaf1fd;color:var(--primary);}
.b-d1{background:#e6f9ef;color:#1a7a4a;}
.b-d2{background:#fff3e0;color:#b85c00;}
.b-d3{background:#fdeaea;color:#a02020;}
.prob-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:18px;box-shadow:var(--sh);}
.prob-card h3{font-size:.82rem;font-weight:700;color:var(--primary);margin-bottom:10px;text-transform:uppercase;letter-spacing:.04em;}
.prob-text{font-size:1rem;line-height:1.75;color:var(--text);}
.prob-text b{color:var(--pd);}
.data-box{background:#f0f5ff;border-left:3px solid var(--primary);border-radius:8px;padding:10px 14px;margin-top:12px;font-size:.88rem;font-family:'Courier New',monospace;line-height:1.9;}
/* Steps input */
.steps-section{margin-bottom:16px;}
.steps-section h4{font-size:.85rem;font-weight:700;color:var(--text);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.step-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.step-label{font-size:.78rem;color:var(--muted);min-width:52px;font-weight:600;}
.step-input{flex:1;padding:10px 13px;border:2px solid var(--border);border-radius:10px;font-size:.93rem;font-family:'Courier New',monospace;transition:border .2s;background:var(--card);}
.step-input:focus{outline:none;border-color:var(--primary);}
.step-input.ok{border-color:var(--ok);background:#f0faf4;}
.step-input.err{border-color:var(--err);background:#fff5f5;}
.final-row{display:flex;gap:10px;align-items:center;margin-top:4px;}
.final-input{flex:1;padding:13px 16px;border:2px solid var(--primary);border-radius:12px;font-size:1.05rem;font-weight:700;font-family:'Courier New',monospace;transition:border .2s;background:var(--card);}
.final-input:focus{outline:none;border-color:var(--pd);}
.final-input.ok{border-color:var(--ok);background:#f0faf4;}
.final-input.err{border-color:var(--err);background:#fff5f5;}
.check-btn{padding:13px 22px;background:var(--primary);color:white;border:none;border-radius:12px;font-size:.93rem;font-weight:700;cursor:pointer;transition:background .2s;white-space:nowrap;}
.check-btn:hover{background:var(--pd);}
.check-btn:disabled{background:var(--muted);cursor:default;}
/* Feedback */
.fb-box{border-radius:14px;padding:16px 18px;margin-bottom:14px;font-size:.88rem;line-height:1.7;}
.fb-ok{background:#e8faf0;border:1px solid #a8e6c0;color:#1a6a3a;}
.fb-err{background:#fdeaea;border:1px solid #f0b0b0;color:#8a1a1a;}
.fb-part{background:#fff8e6;border:1px solid #f0d080;color:#7a5000;}
.fb-box h4{font-size:.95rem;margin-bottom:8px;}
.sol-steps{background:#f8f9ff;border:1px solid #e0e8ff;border-radius:10px;padding:12px 14px;margin-top:10px;font-family:'Courier New',monospace;font-size:.85rem;line-height:2;}
.sol-step{padding:2px 0;border-bottom:1px solid #eef;}
.sol-step:last-child{border:none;}
.hint-btn{background:none;border:1px solid var(--warn);color:var(--warn);border-radius:8px;padding:5px 13px;font-size:.78rem;cursor:pointer;font-weight:600;transition:all .18s;}
.hint-btn:hover{background:#fff8e6;}
.hint-box{background:#fffbea;border:1px solid #f5e0a0;border-radius:10px;padding:11px 14px;margin-bottom:12px;font-size:.86rem;line-height:1.75;color:#7a5000;}
/* Nav buttons */
.action-row{display:flex;gap:10px;margin-top:4px;}
.btn-next{flex:2;padding:13px;background:var(--primary);color:white;border:none;border-radius:12px;font-size:.93rem;font-weight:700;cursor:pointer;}
.btn-next:hover{background:var(--pd);}
.btn-home{flex:1;padding:13px;background:var(--card);color:var(--primary);border:2px solid var(--primary);border-radius:12px;font-size:.88rem;font-weight:600;cursor:pointer;}
.btn-home:hover{background:#eaf1fd;}
/* Results */
.res-card{background:var(--card);border-radius:16px;padding:28px;text-align:center;box-shadow:var(--sh);}
.res-emoji{font-size:3.5rem;margin-bottom:12px;}
.res-score{font-size:2.5rem;font-weight:800;color:var(--primary);margin-bottom:4px;}
.res-label{font-size:.9rem;color:var(--muted);margin-bottom:20px;}
.res-breakdown{text-align:left;margin-top:18px;}
.res-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:.88rem;}
.res-row:last-child{border:none;}
.tick{color:var(--ok);font-weight:700;}
.cross{color:var(--err);font-weight:700;}
.part{color:var(--warn);font-weight:700;}
/* Scroll helper */
.scroll-top{display:none;}
.home-link{
    text-decoration:none;
    color:var(--primary);
    font-weight:700;
    white-space:nowrap;
}

.home-link:hover{
    text-decoration:underline;
}

<script>
// в”Җв”Җв”Җ UTILS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function rndNZ(a,b){var v;do{v=rnd(a,b);}while(v===0);return v;}
function shuffle(a){return a.slice().sort(()=>Math.random()-.5);}
function gcd(a,b){a=Math.abs(a);b=Math.abs(b);return b===0?a:gcd(b,a%b);}
function lcm(a,b){return Math.abs(a*b)/gcd(a,b);}
function simplify(n,d){var g=gcd(Math.abs(n),Math.abs(d));return[n/g,d/g];}
function norm(s){return String(s).trim().toLowerCase().replace(/\s+/g,' ').replace(/,/g,'.');}
function numEq(a,b,tol){tol=tol||0.01;var na=parseFloat(norm(a)),nb=parseFloat(norm(b));if(isNaN(na)||isNaN(nb))return false;return Math.abs(na-nb)<=tol;}
function fracEq(input,n,d){
  var s=norm(input);
  // Accept simplified or equivalent
  var sp=simplify(n,d);
  if(s===sp[0]+'/'+sp[1])return true;
  if(s===n+'/'+d)return true;
  // Accept decimal equivalent
  if(numEq(s,n/d,0.001))return true;
  // Accept "n/d" formats with spaces
  var m=s.match(/^(-?\d+)\s*\/\s*(\d+)$/);
  if(m){var mn=parseInt(m[1]),md=parseInt(m[2]);var g=gcd(Math.abs(mn),Math.abs(md));return mn/g===sp[0]&&md/g===sp[1];}
  return false;
}
function pctEq(input,val){var s=norm(input).replace('%','').trim();return numEq(s,val,0.1);}

// в”Җв”Җв”Җ PROBLEM GENERATORS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

// --- NATURALS I DECIMAL SYS ---
function genNaturalProb(){
  var type=rnd(1,4),diff,text,dataBox,steps,answer,hints,unit='';
  if(type===1){
    diff=1;
    var a=rnd(1000,99999),b=rnd(1000,99999),c=rnd(1000,9999);
    var res=a+b-c;
    text='Un estadi tГ© <b>'+a.toLocaleString('ca')+' seients</b> a la tribuna, <b>'+b.toLocaleString('ca')+' seients</b> al fons nord i s\'han tret <b>'+c.toLocaleString('ca')+' seients</b> per obres. Quants seients queden en total?';
    steps=[{label:'Pas 1',hint:'Suma les dues zones',check:function(v){return numEq(v,a+b);}},{label:'Pas 2',hint:'Resta els seients retirats',check:function(v){return numEq(v,res);}}];
    answer={check:function(v){return numEq(v,res)||norm(v)===String(res)+' seients';},val:res+' seients'};
    hints=['Primer suma els seients de les dues zones: '+a+' + '+b,'DesprГ©s resta els que han tret: '+(a+b)+' - '+c];
  } else if(type===2){
    diff=2;
    var preuU=rnd(5,30),q=rnd(15,80),desc=rnd(1,5)*10;
    var subtot=preuU*q,res2=subtot-desc;
    text='Una papereria ven <b>'+q+' bolГӯgrafs</b> a <b>'+preuU+' euros</b> cadascun. El client tГ© un cupГі de descompte de <b>'+desc+' euros</b>. Quant paga en total?';
    steps=[{label:'Pas 1',hint:'Preu sense descompte',check:function(v){return numEq(v,subtot);}},{label:'Pas 2',hint:'Aplica el descompte',check:function(v){return numEq(v,res2);}}];
    answer={check:function(v){return numEq(v,res2)||norm(v)===String(res2)+' euros';},val:res2+' euros'};
    hints=['Preu total: '+preuU+' Г— '+q+' = '+subtot+' euros','Amb descompte: '+subtot+' вҲ’ '+desc+' = '+res2+' euros'];
  } else if(type===3){
    diff=2;
    var fil=rnd(3,8),col=rnd(4,10),extra=rnd(5,20);
    var res3=fil*col+extra;
    text='Una sala de cinema tГ© <b>'+fil+' files</b> amb <b>'+col+' butaques</b> cadascuna, mГ©s <b>'+extra+' butaques</b> d\'espai adaptat. Quantes butaques tГ© la sala en total?';
    steps=[{label:'Pas 1',hint:'Butaques de les files',check:function(v){return numEq(v,fil*col);}},{label:'Pas 2',hint:'Suma les adaptades',check:function(v){return numEq(v,res3);}}];
    answer={check:function(v){return numEq(v,res3)||norm(v)===String(res3)+' butaques';},val:res3+' butaques'};
    hints=[fil+' Г— '+col+' = '+(fil*col)+' butaques normals',(fil*col)+' + '+extra+' = '+res3+' total'];
  } else {
    diff=3;
    var torns=rnd(3,5),hores=rnd(6,8),prod=rnd(20,60);
    var perDia=torns*hores*prod,dies=rnd(5,20),total=perDia*dies;
    text='Una fГ brica treballa <b>'+torns+' torns</b> al dia, <b>'+hores+' hores</b> per torn. Cada hora produeix <b>'+prod+' peces</b>. Si treballa <b>'+dies+' dies</b>, quantes peces produeix en total?';
    steps=[{label:'Pas 1',hint:'Peces per hora Г— hores per torn',check:function(v){return numEq(v,prod*hores);}},{label:'Pas 2',hint:'Peces per torn Г— torns al dia',check:function(v){return numEq(v,prod*hores*torns);}},{label:'Pas 3',hint:'ProducciГі diГ ria Г— dies',check:function(v){return numEq(v,total);}}];
    answer={check:function(v){return numEq(v,total)||norm(v)===String(total)+' peces';},val:total+' peces'};
    hints=['Per torn: '+prod+' Г— '+hores+' = '+(prod*hores)+' peces','Per dia: '+(prod*hores)+' Г— '+torns+' = '+perDia+' peces','Total: '+perDia+' Г— '+dies+' = '+total+' peces'];
  }
  return{cat:'Naturals i operacions',diff:diff,text:text,dataBox:null,steps:steps,answer:answer,hints:hints};
}

// --- DIVISIBILITAT ---
function genDivisProb(){
  var type=rnd(1,3),diff,text,steps,answer,hints;
  if(type===1){
    diff=2;
    var n=rnd(12,60),ps=[2,3,5,7,11,13];
    var tmp=n,facs=[],fcounts={};
    for(var i=0;i<ps.length;i++){while(tmp%ps[i]===0){facs.push(ps[i]);tmp/=ps[i];}}
    if(tmp>1)facs.push(tmp);
    facs.forEach(function(f){fcounts[f]=(fcounts[f]||0)+1;});
    var factStr=Object.keys(fcounts).map(function(k){return fcounts[k]>1?k+'^'+fcounts[k]:k;}).join(' Г— ');
    var allDivs=[];for(var k=1;k<=n;k++){if(n%k===0)allDivs.push(k);}
    text='Descompon <b>'+n+'</b> en factors primers i llista tots els seus divisors.';
    steps=[
      {label:'Factoritz.',hint:'Expressa com a producte de primers',check:function(v){
        var s=norm(v).replace(/\^/g,'^').replace(/x/g,'Г—').replace(/\*/g,'Г—');
        // Accept various formats
        var nums=s.match(/\d+/g)||[];
        if(!nums)return false;
        var prod=nums.reduce(function(a,b){return a*parseInt(b);},1);
        return prod===n && s.indexOf('Г—')>=0;
      }},
      {label:'Divisors',hint:'Llista tots els divisors (separats per comes)',check:function(v){
        var nums=(v.match(/\d+/g)||[]).map(Number).sort(function(a,b){return a-b;});
        return JSON.stringify(nums)===JSON.stringify(allDivs);
      }}
    ];
    answer={check:function(v){
      var nums=(v.match(/\d+/g)||[]).map(Number).sort(function(a,b){return a-b;});
      return JSON.stringify(nums)===JSON.stringify(allDivs);
    },val:allDivs.join(', ')};
    hints=['Divideix '+n+' per 2, 3, 5... fins que no es pugui mГ©s','FactoritzaciГі: '+n+' = '+factStr,'Divisors: tots els nombres per qui '+n+' Г©s exactament divisible: '+allDivs.join(', ')];
  } else if(type===2){
    diff=2;
    var a=rnd(20,60),b=rnd(15,50);
    var g=gcd(a,b),l=lcm(a,b);
    text='Calcula el <b>MCD</b> i el <b>mcm</b> de <b>'+a+'</b> i <b>'+b+'</b> usant la factoritzaciГі en factors primers. Comprova que MCD Г— mcm = '+a+' Г— '+b+' = '+(a*b)+'.';
    steps=[
      {label:'Factor. '+a,hint:'Factoritza '+a,check:function(v){var nums=(v.match(/\d+/g)||[]).map(Number);return nums.reduce(function(acc,n){return acc*n;},1)===a&&nums.length>1||v.trim()===String(a);}},
      {label:'Factor. '+b,hint:'Factoritza '+b,check:function(v){var nums=(v.match(/\d+/g)||[]).map(Number);return nums.reduce(function(acc,n){return acc*n;},1)===b&&nums.length>1||v.trim()===String(b);}},
      {label:'MCD',hint:'Factors comuns, exponent mГӯnim',check:function(v){return numEq(v,g);}},
      {label:'mcm',hint:'Tots els factors, exponent mГ xim',check:function(v){return numEq(v,l);}}
    ];
    answer={check:function(v){return numEq(v,l);},val:'mcm = '+l+' (MCD = '+g+')'};
    hints=['Factoritza els dos nombres i identifica els factors comuns','MCD = factors comuns amb exponent mГӯnim','mcm = tots els factors amb exponent mГ xim','ComprovaciГі: '+g+' Г— '+l+' = '+(g*l)+' = '+a+' Г— '+b];
  } else {
    diff=3;
    var divs2=[3,4,5,6],d1=divs2[rnd(0,3)],d2=divs2[rnd(0,3)];
    while(d2===d1)d2=divs2[rnd(0,3)];
    var l2=lcm(d1,d2);
    var base=l2*rnd(2,5);

    while(res<=0){d=1;res=a*inner*inner-d;}
    var expr=a+' Г— ('+b+' + '+c+')\u00b2 вҲ’ '+d;
    text='Calcula pas a pas, respectant la jerarquia d\'operacions:<br><b style="font-family:\'Courier New\',monospace;font-size:1.05rem">'+expr+'</b>';
    steps=[{label:'ParГЁntesi',hint:'Calcula el parГЁntesi primer',check:function(v){return numEq(v,inner);}},{label:'PotГЁncia',hint:'Eleva al quadrat',check:function(v){return numEq(v,inner*inner);}},{label:'Producte',hint:a+' Г— '+inner*inner,check:function(v){return numEq(v,a*inner*inner);}},{label:'Resultat',hint:'Resta '+d,check:function(v){return numEq(v,res);}}];
    answer={check:function(v){return numEq(v,res);},val:String(res)};
    hints=['1r: parГЁntesi ('+b+'+'+c+') = '+inner,'2n: potГЁncia '+inner+'\u00b2 = '+(inner*inner),'3r: producte '+a+'Г—'+(inner*inner)+' = '+(a*inner*inner),'4t: resta '+(a*inner*inner)+'вҲ’'+d+' = '+res];
  } else if(type===2){
    diff=2;
    var a2=rnd(2,6),b2=rnd(2,4),c2=rnd(2,6),d2=rnd(2,4),e2=rnd(1,8);
    var res2=a2*b2*b2+(c2-d2)*e2;
    var expr2=a2+' Г— '+b2+'\u00b2 + ('+c2+' вҲ’ '+d2+') Г— '+e2;
    text='Calcula pas a pas:<br><b style="font-family:\'Courier New\',monospace;font-size:1.05rem">'+expr2+'</b>';
    steps=[{label:'PotГЁncia',hint:b2+'\u00b2',check:function(v){return numEq(v,b2*b2);}},{label:'ParГЁntesi',hint:c2+' вҲ’ '+d2,check:function(v){return numEq(v,c2-d2);}},{label:'Prod. 1',hint:a2+' Г— '+b2*b2,check:function(v){return numEq(v,a2*b2*b2);}},{label:'Prod. 2',hint:(c2-d2)+' Г— '+e2,check:function(v){return numEq(v,(c2-d2)*e2);}},{label:'Resultat',hint:'Suma els productes',check:function(v){return numEq(v,res2);}}];
    answer={check:function(v){return numEq(v,res2);},val:String(res2)};
    hints=['1r: '+b2+'\u00b2 = '+(b2*b2),'2n: ('+c2+'вҲ’'+d2+') = '+(c2-d2),'3r: '+a2+'Г—'+(b2*b2)+' = '+(a2*b2*b2),'4t: '+(c2-d2)+'Г—'+e2+' = '+((c2-d2)*e2),'5ГЁ: '+(a2*b2*b2)+' + '+((c2-d2)*e2)+' = '+res2];
  } else {
    diff=3;
    var a3=rnd(2,5),b3=rnd(2,4),c3=rnd(2,5),d3=rnd(2,4),e3=rnd(2,4),f3=rnd(1,6);
    var inner3=c3*d3,res3=a3*(b3*b3+inner3)-f3*e3;
    var expr3=a3+' Г— ('+b3+'\u00b2 + '+c3+' Г— '+d3+') вҲ’ '+f3+' Г— '+e3;
    text='Calcula pas a pas:<br><b style="font-family:\'Courier New\',monospace;font-size:1.05rem">'+expr3+'</b>';
    steps=[{label:'P. potГЁncia',hint:b3+'\u00b2 (dins parГЁntesi)',check:function(v){return numEq(v,b3*b3);}},{label:'P. prod.',hint:c3+' Г— '+d3+' (dins parГЁntesi)',check:function(v){return numEq(v,inner3);}},{label:'ParГЁntesi',hint:'Suma dins el parГЁntesi',check:function(v){return numEq(v,b3*b3+inner3);}},{label:'Fora prod. 1',hint:a3+' Г— parГЁntesi',check:function(v){return numEq(v,a3*(b3*b3+inner3));}},{label:'Fora prod. 2',hint:f3+' Г— '+e3,check:function(v){return numEq(v,f3*e3);}},{label:'Resultat',check:function(v){return numEq(v,res3);}}];
    answer={check:function(v){return numEq(v,res3);},val:String(res3)};
    hints=['Dins parГЁntesi: '+b3+'\u00b2='+b3*b3+' i '+c3+'Г—'+d3+'='+inner3,'ParГЁntesi: '+(b3*b3)+'+'+inner3+'='+(b3*b3+inner3),''+a3+'Г—'+(b3*b3+inner3)+'='+(a3*(b3*b3+inner3)),''+f3+'Г—'+e3+'='+(f3*e3),'Final: '+(a3*(b3*b3+inner3))+' вҲ’ '+(f3*e3)+' = '+res3];
  }
  return{cat:'Jerarquia d\'operacions',diff:diff,text:text,dataBox:null,steps:steps,answer:answer,hints:hints};
}

// в”Җв”Җв”Җ CATEGORIES SETUP в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
var CATS=[
  {id:'naturals',icon:'рҹ”ў',name:'Naturals i operacions',desc:'Sumes, restes, multiplicaciГі i divisiГі en context',gen:genNaturalProb},
  {id:'jerarquia',icon:'рҹ“җ',name:'Jerarquia d\'operacions',desc:'Passos obligatoris amb parГЁntesis i potГЁncies',gen:genJerProb},
  {id:'divis',icon:'рҹ”Қ',name:'Divisibilitat',desc:'Factors primers, MCD, mcm i problemes',gen:genDivisProb},
  {id:'enters',icon:'Вұ',name:'Nombres enters',desc:'Temperatures, saldos i altures amb negatius',gen:genEntersProb},
  {id:'decimals',icon:'рҹ’°',name:'Nombres decimals',desc:'Operacions i problemes amb decimals',gen:genDecimalsProb},
  {id:'fraccions',icon:'ВҪ',name:'Fraccions',desc:'Parts del tot, suma amb distints denominadors',gen:genFraccionsProb},
  {id:'pct',icon:'%',name:'Percentatges',desc:'Descomptes, augments i proporcions',gen:genPctProb},
  {id:'mix',icon:'рҹҺІ',name:'Barreja de tot',desc:'Tots els temes barrejats aleatГІriament',gen:null}
];

// в”Җв”Җв”Җ STATE в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
var cfg={cats:['mix'],nq:5,diff:0};
var session={probs:[],idx:0,results:[],hintUsed:false,hintsShown:false};

function renderHome(){
  var g=document.getElementById('catGrid'),html='';
  CATS.forEach(function(c){
    var sel=cfg.cats.indexOf(c.id)>=0;
    html+='<div class="cat'+(sel?' active-cat':'')+'" onclick="togCat(\''+c.id+'\')" id="cat_'+c.id+'">'+
      '<div class="cat-icon">'+c.icon+'</div><h3>'+c.name+'</h3><p>'+c.desc+'</p></div>';
  });
  document.getElementById('catGrid').innerHTML=html;
}
function togCat(id){
  var i=cfg.cats.indexOf(id);
  if(i>=0){if(cfg.cats.length>1)cfg.cats.splice(i,1);}
  else cfg.cats.push(id);
  renderHome();
}
function selNQ(n,btn){cfg.nq=n;document.querySelectorAll('#nqRow .cfg-btn').forEach(function(b){b.classList.remove('sel');});btn.classList.add('sel');}
function selDiff(d,btn){cfg.diff=d;document.querySelectorAll('#diffRow .cfg-btn').forEach(function(b){b.classList.remove('sel');});btn.classList.add('sel');}

function startSession(){
  session.probs=[];session.idx=0;session.results=[];
  var gens=[];
  cfg.cats.forEach(function(cid){
    var c=CATS.find(function(x){return x.id===cid;});
    if(!c)return;
    if(c.id==='mix'){CATS.filter(function(x){return x.id!=='mix'&&x.gen;}).forEach(function(x){gens.push(x.gen);});}
    else if(c.gen)gens.push(c.gen);
  });
  if(gens.length===0)gens=CATS.filter(function(x){return x.gen;}).map(function(x){return x.gen;});
  var attempts=0;
  while(session.probs.length<cfg.nq&&attempts<400){
    attempts++;
    var g=gens[rnd(0,gens.length-1)];
    var p;try{p=g();}catch(e){continue;}
    if(cfg.diff>0&&p.diff!==cfg.diff)continue;
    session.probs.push(p);
  }
  if(session.probs.length===0){var fb=CATS.find(function(x){return x.gen;});if(fb)session.probs.push(fb.gen());}
  showProb();
}

function showScreen(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});document.getElementById(id).classList.add('active');}
function goHome(){showScreen('sHome');renderHome();document.getElementById('navScore').textContent='';}

function showProb(){
  session.hintUsed=false;session.hintsShown=false;
  var p=session.probs[session.idx];
  var pct=Math.round(session.idx/session.probs.length*100);
  document.getElementById('progBar').style.width=pct+'%';
  document.getElementById('navScore').textContent=(session.idx+1)+'/'+session.probs.length;
  // Meta
  var diffLabel=['','рҹҹў BГ sica','рҹҹЎ Mitja','рҹ”ҙ DifГӯcil'][p.diff]||'';
  document.getElementById('probMeta').innerHTML=
    '<span class="badge b-cat">'+p.cat+'</span><span class="badge b-d'+p.diff+'">'+diffLabel+'</span>';
  // Problem card
  var phtml='<h3>рҹ“Ӣ Problema</h3><div class="prob-text">'+p.text+'</div>';
  if(p.dataBox)phtml+='<div class="data-box">'+p.dataBox+'</div>';
  document.getElementById('probCard').innerHTML=phtml;
  // Hint area
  document.getElementById('hintArea').innerHTML=
    '<button class="hint-btn" onclick="showHint()">рҹ’Ў Veure pista</button>';
  // Steps
  var sh='<h4>вңҸпёҸ Escriu els teus passos:</h4>';
  (p.steps||[]).forEach(function(s,i){
    sh+='<div class="step-row"><span class="step-label">'+s.label+'</span>'+
      '<input class="step-input" id="step_'+i+'" placeholder="Escriu aquГӯ..." onkeydown="if(event.key===\'Enter\')focusNext('+i+')" autocomplete="off">'+
      '</div>';
  });
  document.getElementById('stepsSection').innerHTML=sh;
  // Final answer
  document.getElementById('finalRow').innerHTML=
    '<input class="final-input" id="finalAns" placeholder="вңҸпёҸ Resposta final..." autocomplete="off" onkeydown="if(event.key===\'Enter\')checkAnswer()">'+
    '<button class="check-btn" onclick="checkAnswer()">Comprovar вң“</button>';
  document.getElementById('fbArea').innerHTML='';
  document.getElementById('actionRow').style.display='none';
  document.getElementById('navTitle').textContent='рҹ“җ Problemes Sentit NumГЁric';
  showScreen('sProb');
  setTimeout(function(){var el=document.getElementById('step_0')||document.getElementById('finalAns');if(el)el.focus();},100);
}

function focusNext(i){
  var next=document.getElementById('step_'+(i+1))||document.getElementById('finalAns');
  if(next)next.focus();
}

function showHint(){
  var p=session.probs[session.idx];
  session.hintUsed=true;session.hintsShown=true;
  var html='<div class="hint-box"><b>рҹ’Ў Pistes:</b><br>'+(p.hints||[]).map(function(h){return 'вҖў '+h;}).join('<br>')+'</div>';
  document.getElementById('hintArea').innerHTML=html;
}

function checkAnswer(){
  var p=session.probs[session.idx];
  var finalVal=document.getElementById('finalAns').value;
  if(!finalVal.trim())return;
  // Check steps
  var stepsOk=0,stepsTotal=(p.steps||[]).length;
  (p.steps||[]).forEach(function(s,i){
    var inp=document.getElementById('step_'+i);if(!inp)return;
    var ok=s.check(inp.value);
    inp.classList.toggle('ok',ok);inp.classList.toggle('err',!ok&&inp.value.trim()!=='');
    if(ok)stepsOk++;
  });
  // Check final
  var finalOk=p.answer.check(finalVal);
  var finInp=document.getElementById('finalAns');
  finInp.classList.toggle('ok',finalOk);finInp.classList.toggle('err',!finalOk);
  // Disable inputs
  document.querySelectorAll('.step-input,.final-input').forEach(function(el){el.disabled=true;});
  document.querySelector('.check-btn').disabled=true;
  // Feedback
  var quality=finalOk?(session.hintUsed?'part':'ok'):(stepsOk>stepsTotal/2?'part':'ko');
  session.results.push({ok:finalOk,hintUsed:session.hintUsed,stepsOk:stepsOk,stepsTotal:stepsTotal,prob:p,given:finalVal});
  var fbHtml='';
  if(quality==='ok'){
    fbHtml='<div class="fb-box fb-ok"><h4>вң… ExcelВ·lent! Resposta correcta.</h4>';
    if(stepsTotal>0&&stepsOk<stepsTotal)fbHtml+='<small>Revisa algun pas intermedi marcat en vermell.</small>';
    fbHtml+='</div>';
  } else if(quality==='part'){
    fbHtml='<div class="fb-box fb-part"><h4>вҡ пёҸ '+(finalOk?'Correcte, perГІ has usat la pista':'Resposta incorrecta')+'</h4>';
    fbHtml+='La resposta correcta Г©s: <b>'+p.answer.val+'</b>';
    if(!finalOk){fbHtml+='<div class="sol-steps">';(p.hints||[]).forEach(function(h){fbHtml+='<div class="sol-step">вҖў '+h+'</div>';});fbHtml+='</div>';}
    fbHtml+='</div>';
  } else {
    fbHtml='<div class="fb-box fb-err"><h4>вқҢ Resposta incorrecta</h4>';
    fbHtml+='La resposta correcta Г©s: <b>'+p.answer.val+'</b>';
    fbHtml+='<div class="sol-steps"><b>SoluciГі pas a pas:</b><br>';
    (p.hints||[]).forEach(function(h,i){fbHtml+='<div class="sol-step">Pas '+(i+1)+': '+h+'</div>';});
    fbHtml+='</div></div>';
  }
  document.getElementById('fbArea').innerHTML=fbHtml;
  document.getElementById('actionRow').style.display='flex';
  var isLast=session.idx>=session.probs.length-1;
  document.getElementById('btnNext').textContent=isLast?'Veure resultat рҹ“Ҡ':'SegГјent в–¶';
  document.getElementById('btnNext').onclick=isLast?showResults:nextProb;
  window.scrollTo({top:document.getElementById('fbArea').offsetTop-80,behavior:'smooth'});
}

function nextProb(){session.idx++;showProb();}

function showResults(){
  var total=session.results.length;
  var ok=session.results.filter(function(r){return r.ok&&!r.hintUsed;}).length;
  var part=session.results.filter(function(r){return r.ok&&r.hintUsed;}).length;
  var ko=total-ok-part;
  var pct=Math.round((ok+part*0.5)/total*100);
  document.getElementById('resEmoji').textContent=pct>=85?'рҹҸҶ':pct>=65?'рҹ‘Қ':pct>=40?'рҹ’Ә':'рҹ“ҡ';
  document.getElementById('resScore').textContent=ok+'/'+total;
  document.getElementById('resLabel').textContent=pct+'% de puntuaciГі efectiva В· '+(part>0?part+' amb pista В· ':'')+'Temps lliure';
  var bhtml='<div style="font-size:.85rem;font-weight:700;color:var(--muted);margin-bottom:8px;">DETALL DE CADA PROBLEMA</div>';
  session.results.forEach(function(r,i){
    var icon=r.ok&&!r.hintUsed?'вң…':r.ok&&r.hintUsed?'вҡ пёҸ':'вқҢ';
    var cls=r.ok&&!r.hintUsed?'tick':r.ok&&r.hintUsed?'part':'cross';
    bhtml+='<div class="res-row"><span><b>'+icon+' '+(i+1)+'.</b> '+r.prob.cat+(r.hintUsed?' <span style="color:var(--warn)">(pista)</span>':'')+'</span>'+
      '<span class="'+cls+'">'+(r.ok?'Correcte':'R: '+r.prob.answer.val)+'</span></div>';
  });
  document.getElementById('resBreakdown').innerHTML=bhtml;
  document.getElementById('progBar')&&(document.getElementById('progBar').style.width='100%');
  showScreen('sResults');
  document.getElementById('navScore').textContent='';
}

// Init
renderHome();
</script>
