<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Problemes Sentit Espacial · 1r ESO</title>
<meta name="author" content="Salvador Rigual Valls">
<style>
:root{
  --bg:#f4f7fb;--card:#fff;--primary:#5c6bc0;--pdark:#3949ab;
  --success:#43a047;--error:#e53935;--warn:#fb8c00;--muted:#78909c;
  --border:#dde3ed;--shadow:0 2px 14px rgba(0,0,0,0.09);--text:#263238;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
nav{background:var(--card);border-bottom:1px solid var(--border);padding:12px 22px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow);position:sticky;top:0;z-index:100;}
nav h1{font-size:1rem;font-weight:700;color:var(--primary);flex:1;}
.nav-back{background:none;border:none;cursor:pointer;color:var(--muted);font-size:1.2rem;padding:4px 8px;border-radius:6px;}
.nav-back:hover{background:var(--bg);}
.screen{display:none;padding:22px;max-width:700px;margin:0 auto;}
.screen.active{display:block;}

/* HOME */
.home-header{text-align:center;padding:24px 0 16px;}
.home-header h2{font-size:1.65rem;color:var(--primary);margin-bottom:6px;}
.home-header p{color:var(--muted);font-size:.88rem;}
.cats-grid{display:flex;flex-direction:column;gap:10px;margin-top:18px;}
.cat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:15px 18px;cursor:pointer;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow);transition:transform .15s,box-shadow .15s;}
.cat-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(92,107,192,.18);}
.cat-icon{font-size:1.5rem;width:38px;text-align:center;flex-shrink:0;}
.cat-info{flex:1;}
.cat-info h3{font-size:.96rem;font-weight:600;}
.cat-info p{font-size:.77rem;color:var(--muted);margin-top:2px;}
.cat-badge{font-size:.72rem;padding:3px 10px;border-radius:20px;font-weight:600;white-space:nowrap;background:#eef0fb;color:var(--primary);}

/* PROBLEMA */
.prob-meta{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.prob-num{font-size:.78rem;color:var(--muted);}
.prob-diff{font-size:.72rem;padding:2px 10px;border-radius:20px;font-weight:700;}
.diff-1{background:#e8f5e9;color:var(--success);}
.diff-2{background:#fff3e0;color:var(--warn);}
.diff-3{background:#ffebee;color:var(--error);}
.prob-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px;box-shadow:var(--shadow);}
.prob-box .context{font-size:.9rem;color:var(--muted);margin-bottom:10px;line-height:1.6;font-style:italic;}
.prob-box .enunciat{font-size:1rem;font-weight:600;line-height:1.65;}
.prob-box svg{display:block;margin:12px auto 0;}
.hint-strip{background:#fff8e1;border:1px solid #ffe082;border-radius:10px;padding:11px 14px;margin-bottom:14px;font-size:.85rem;line-height:1.7;display:none;}
.hint-strip.show{display:block;}
.hint-strip h4{color:var(--warn);margin-bottom:4px;font-size:.82rem;}
.answer-area{margin-bottom:14px;}
.answer-area>label{display:block;font-size:.83rem;color:var(--muted);margin-bottom:5px;font-weight:600;}

/* TECLAT MATEMÀTIC */
.math-kbd-wrap{background:#f0f2fa;border:1px solid var(--border);border-radius:12px;padding:10px 12px;margin-bottom:10px;}
.math-kbd-title{font-size:.75rem;color:var(--muted);font-weight:600;margin-bottom:7px;display:flex;align-items:center;gap:6px;}
.math-kbd-title::before{content:'⌨️';}
.kbd-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:5px;}
.kbd-row:last-child{margin-bottom:0;}
.kbd-sep{width:100%;height:0;border-top:1px dashed var(--border);margin:3px 0;}
.k{background:var(--card);border:1.5px solid var(--border);border-radius:7px;padding:5px 10px;font-size:.88rem;cursor:pointer;transition:all .12s;white-space:nowrap;user-select:none;font-family:inherit;}
.k:hover{background:#eef0fb;border-color:var(--primary);color:var(--primary);}
.k:active{transform:scale(.95);}
.k.k-unit{background:#fff8e1;border-color:#ffe082;font-size:.82rem;}
.k.k-op{background:#f0eeff;border-color:#c5cae9;}
.k.k-sym{background:#fce4ec;border-color:#f48fb1;font-size:.82rem;}
.k.k-clear{background:#ffebee;border-color:#ef9a9a;color:var(--error);}

/* Camps numèrics */
.num-fields{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px;}
.num-field{display:flex;flex-direction:column;gap:3px;}
.num-field-label{font-size:.8rem;color:var(--text);font-weight:600;}
.num-input-row{display:flex;align-items:center;gap:6px;}
.num-input{border:2px solid var(--border);border-radius:9px;padding:9px 12px;font-size:1rem;width:140px;transition:border .2s;font-family:inherit;}
.num-input:focus{outline:none;border-color:var(--primary);}
.num-input.ok{border-color:var(--success);background:#e8f5e9;}
.num-input.err{border-color:var(--error);background:#ffebee;}
.unit-tag{font-size:.82rem;color:var(--muted);font-weight:600;}

/* Camp text llarg */
.proc-input{width:100%;border:2px solid var(--border);border-radius:10px;padding:11px 14px;font-size:.9rem;min-height:90px;resize:vertical;transition:border .2s;font-family:inherit;line-height:1.6;}
.proc-input:focus{outline:none;border-color:var(--primary);}

/* Feedback */
.fb-box{border-radius:12px;padding:15px 17px;margin-bottom:14px;font-size:.88rem;line-height:1.7;display:none;}
.fb-box.show{display:block;}
.fb-box.ok{background:#e8f5e9;border:1px solid #a5d6a7;color:#1b5e20;}
.fb-box.partial{background:#fff8e1;border:1px solid #ffe082;color:#5d4037;}
.fb-box.ko{background:#ffebee;border:1px solid #ef9a9a;color:#7f0000;}
.fb-box h4{margin-bottom:7px;font-size:.93rem;}
.sol-step{padding:4px 0;border-bottom:1px solid rgba(0,0,0,.07);}
.sol-step:last-child{border:none;}
.sol-step b{color:var(--primary);}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
.btn-p{background:var(--primary);color:#fff;border:none;border-radius:11px;padding:12px 24px;font-size:.9rem;font-weight:700;cursor:pointer;flex:1;min-width:120px;transition:background .2s;}
.btn-p:hover{background:var(--pdark);}
.btn-s{background:var(--card);color:var(--primary);border:2px solid var(--primary);border-radius:11px;padding:10px 20px;font-size:.9rem;font-weight:700;cursor:pointer;flex:1;min-width:120px;transition:all .2s;}
.btn-s:hover{background:#eef0fb;}
.btn-hint{background:none;border:1px solid var(--warn);border-radius:9px;padding:8px 15px;font-size:.82rem;color:var(--warn);font-weight:600;cursor:pointer;}
.btn-hint:hover{background:#fff8e1;}
.score-big{text-align:center;padding:30px 16px;}
.score-big .trophy{font-size:3rem;margin-bottom:12px;}
.score-big h2{font-size:1.4rem;color:var(--primary);margin-bottom:8px;}
.score-num{font-size:2.2rem;font-weight:800;color:var(--primary);}
.score-num span{font-size:.95rem;color:var(--muted);font-weight:400;display:block;}

/* Focus highlight per saber quin camp actiu */
.num-input.active-field{border-color:var(--primary);box-shadow:0 0 0 3px rgba(92,107,192,.15);}
</style>
</head>
<body>

<nav>
  <button class="nav-back" id="navBack" onclick="goBack()" style="display:none">←</button>
  <h1 id="navTitle">Problemes Sentit Espacial · 1r ESO</h1>
</nav>

<div class="screen active" id="sHome">
  <div class="home-header">
    <h2>📐 Problemes</h2>
    <p>Practica com en un examen real: escriu la teva solució pas a pas</p>
  </div>
  <div class="cats-grid" id="catsGrid"></div>
</div>

<div class="screen" id="sProb">
  <div class="prob-meta">
    <span class="prob-num" id="probNum"></span>
    <span class="prob-diff" id="probDiff"></span>
  </div>
  <div class="prob-box" id="probBox"></div>
  <div class="hint-strip" id="hintStrip"><h4>💡 Pista</h4><div id="hintText"></div></div>
  <div class="answer-area" id="answerArea"></div>
  <div class="fb-box" id="fbBox"></div>
  <div class="btn-row">
    <button class="btn-hint" id="btnHint" onclick="showHint()">💡 Pista</button>
    <button class="btn-p" id="btnCheck" onclick="checkAnswer()">Comprova ✓</button>
  </div>
  <div class="btn-row">
    <button class="btn-s" id="btnNext" onclick="nextProb()" style="display:none">Següent problema →</button>
    <button class="btn-s" onclick="goBack()">← Tornar</button>
  </div>
</div>

<div class="screen" id="sResult">
  <div id="resultContent"></div>
</div>

<script>
// ── UTILS ────────────────────────────────────────────────────────────────────
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function shuffle(a){return [...a].sort(()=>Math.random()-.5);}
function near(a,b){return Math.abs(a-b)<=Math.max(0.05,Math.abs(b)*0.02+0.01);}
const PI=3.14;

// ── TECLAT MATEMÀTIC ────────────────────────────────────────────────────────
// El camp que té el focus actualment
let activeField=null;

function setActiveField(el){
  document.querySelectorAll('.num-input,.proc-input').forEach(e=>e.classList.remove('active-field'));
  activeField=el;
  if(el) el.classList.add('active-field');
}

function insertText(txt){
  const el=activeField;
  if(!el) return;
  const s=el.selectionStart??el.value.length;
  const e2=el.selectionEnd??el.value.length;
  el.value=el.value.slice(0,s)+txt+el.value.slice(e2);
  const pos=s+txt.length;
  el.focus();
  el.setSelectionRange(pos,pos);
}

function kbdClear(){
  if(!activeField) return;
  activeField.value='';
  activeField.focus();
}

function kbdBack(){
  const el=activeField;
  if(!el) return;
  const s=el.selectionStart??el.value.length;
  const e2=el.selectionEnd??el.value.length;
  if(s!==e2){el.value=el.value.slice(0,s)+el.value.slice(e2);}
  else if(s>0){el.value=el.value.slice(0,s-1)+el.value.slice(s);}
  el.focus();
  el.setSelectionRange(Math.max(0,s-1),Math.max(0,s-1));
}

// Genera el bloc HTML del teclat matemàtic
function mathKbd(){
  // Grups de botons: [text mostrat, text inserit, classe extra]
  const nums=[['7','7'],['8','8'],['9','9'],['4','4'],['5','5'],['6','6'],['1','1'],['2','2'],['3','3'],['0','0'],[',','.'],['.','.']] ;
  const ops=[['×','×'],['÷','÷'],['+','+'],['-','-'],['=','='],['(','('],[')',')']] ;
  const syms=[['π','3.14'],['√','√'],['²','²'],['³','³'],['°','°'],["'","'"],['"','"']];
  const units=[['cm','cm'],['m','m'],['cm²','cm²'],['m²','m²'],['cm³','cm³'],['m³','m³'],['€','€'],['L','L']];

  let h=`<div class="math-kbd-wrap">
    <div class="math-kbd-title">Teclat matemàtic — clica el camp de resposta i usa els botons</div>
    <div class="kbd-row">`;
  // Nums
  nums.forEach(([d,v])=>{h+=`<button class="k" onclick="insertText('${v}')">${d}</button>`;});
  h+=`<button class="k k-clear" onclick="kbdBack()">⌫</button>`;
  h+=`<button class="k k-clear" onclick="kbdClear()">✕ Esborra</button>`;
  h+=`</div><div class="kbd-sep"></div><div class="kbd-row">`;
  // Operadors
  ops.forEach(([d,v])=>{h+=`<button class="k k-op" onclick="insertText('${v}')">${d}</button>`;});
  h+=`</div><div class="kbd-sep"></div><div class="kbd-row">`;
  // Símbols
  syms.forEach(([d,v])=>{h+=`<button class="k k-sym" onclick="insertText('${v}')">${d}</button>`;});
  h+=`</div><div class="kbd-sep"></div><div class="kbd-row">`;
  // Unitats
  units.forEach(([d,v])=>{h+=`<button class="k k-unit" onclick="insertText('${v}')">${d}</button>`;});
  h+=`</div></div>`;
  return h;
}

// ── SVG helpers ──────────────────────────────────────────────────────────────
function svgTriRect(a,b){
  const sc=60/Math.max(a,b);const aw=Math.round(a*sc),bh=Math.round(b*sc);
  return `<svg width="${aw+50}" height="${bh+34}" viewBox="0 0 ${aw+50} ${bh+34}" xmlns="http://www.w3.org/2000/svg">
    <polygon points="10,${bh+10} 10,10 ${aw+10},${bh+10}" fill="#c5cae9" fill-opacity=".35" stroke="#5c6bc0" stroke-width="2"/>
    <polyline points="10,${bh} 20,${bh} 20,${bh+10}" fill="none" stroke="#5c6bc0" stroke-width="1.5"/>
    <text x="${aw/2+10}" y="${bh+28}" text-anchor="middle" font-size="11" fill="#555">a=${a} cm</text>
    <text x="4" y="${bh/2+10}" text-anchor="end" font-size="11" fill="#555">b=${b}</text>
    <text x="${aw/2+20}" y="${bh/2}" font-size="11" fill="#e53935">c=?</text></svg>`;
}
function svgCil(r,h){
  return `<svg width="115" height="95" viewBox="0 0 115 95" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="55" cy="22" rx="38" ry="12" fill="#c5cae9" fill-opacity=".4" stroke="#5c6bc0" stroke-width="1.5"/>
    <rect x="17" y="22" width="76" height="50" fill="#c5cae9" fill-opacity=".2" stroke="#5c6bc0" stroke-width="1.5"/>
    <ellipse cx="55" cy="72" rx="38" ry="12" fill="#c5cae9" fill-opacity=".4" stroke="#5c6bc0" stroke-width="1.5"/>
    <line x1="55" y1="22" x2="93" y2="22" stroke="#e53935" stroke-width="1.5" stroke-dasharray="4"/>
    <text x="74" y="18" font-size="10" fill="#e53935">r=${r}</text>
    <line x1="100" y1="22" x2="100" y2="72" stroke="#fb8c00" stroke-width="1.5" stroke-dasharray="4"/>
    <text x="103" y="50" font-size="10" fill="#fb8c00">h=${h}</text></svg>`;
}
function svgCon(r,h){
  return `<svg width="115" height="100" viewBox="0 0 115 100" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="55" cy="82" rx="38" ry="11" fill="#c5cae9" fill-opacity=".4" stroke="#5c6bc0" stroke-width="1.5"/>
    <line x1="55" y1="10" x2="17" y2="82" stroke="#5c6bc0" stroke-width="1.5"/>
    <line x1="55" y1="10" x2="93" y2="82" stroke="#5c6bc0" stroke-width="1.5"/>
    <line x1="55" y1="10" x2="55" y2="82" stroke="#fb8c00" stroke-width="1.5" stroke-dasharray="4"/>
    <text x="58" y="50" font-size="10" fill="#fb8c00">h=${h}</text>
    <line x1="55" y1="82" x2="93" y2="82" stroke="#e53935" stroke-width="1.5" stroke-dasharray="4"/>
    <text x="70" y="96" font-size="10" fill="#e53935">r=${r}</text></svg>`;
}
function svgEsfera(r){
  return `<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <circle cx="50" cy="50" r="38" fill="#c5cae9" fill-opacity=".25" stroke="#5c6bc0" stroke-width="2"/>
    <ellipse cx="50" cy="50" rx="38" ry="13" fill="none" stroke="#5c6bc0" stroke-width="1" stroke-dasharray="4"/>
    <line x1="50" y1="50" x2="88" y2="50" stroke="#e53935" stroke-width="1.5" stroke-dasharray="4"/>
    <text x="69" y="45" font-size="10" fill="#e53935">r=${r}</text>
    <circle cx="50" cy="50" r="2.5" fill="#5c6bc0"/></svg>`;
}
function svgCircle(r){
  return `<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <circle cx="50" cy="50" r="38" fill="#c5cae9" fill-opacity=".2" stroke="#5c6bc0" stroke-width="2"/>
    <line x1="50" y1="50" x2="88" y2="50" stroke="#e53935" stroke-width="1.5" stroke-dasharray="4"/>
    <text x="69" y="44" font-size="10" fill="#e53935">r=${r}</text>
    <circle cx="50" cy="50" r="2.5" fill="#5c6bc0"/></svg>`;
}
function svgPrism(b,al){
  return `<svg width="130" height="100" viewBox="0 0 130 100" xmlns="http://www.w3.org/2000/svg">
    <polygon points="30,80 90,80 110,55 50,55" fill="#c5cae9" fill-opacity=".2" stroke="#5c6bc0" stroke-width="1.5"/>
    <polygon points="30,80 50,55 50,25 30,50" fill="#c5cae9" fill-opacity=".3" stroke="#5c6bc0" stroke-width="1.5"/>
    <polygon points="50,55 110,55 110,25 50,25" fill="#c5cae9" fill-opacity=".15" stroke="#5c6bc0" stroke-width="1.5"/>
    <text x="65" y="96" text-anchor="middle" font-size="9" fill="#555">base ${b}×${b}</text>
    <text x="112" y="42" font-size="9" fill="#fb8c00">h=${al}</text></svg>`;
}
function svgPyramid(b,h){
  return `<svg width="120" height="100" viewBox="0 0 120 100" xmlns="http://www.w3.org/2000/svg">
    <polygon points="60,10 20,80 100,80" fill="#c5cae9" fill-opacity=".25" stroke="#5c6bc0" stroke-width="1.5"/>
    <polygon points="60,10 100,80 112,64" fill="#c5cae9" fill-opacity=".15" stroke="#5c6bc0" stroke-width="1.5"/>
    <line x1="60" y1="10" x2="60" y2="80" stroke="#fb8c00" stroke-width="1.5" stroke-dasharray="3"/>
    <text x="63" y="48" font-size="9" fill="#fb8c00">h=${h}</text>
    <text x="60" y="96" text-anchor="middle" font-size="9" fill="#555">base=${b}×${b}</text></svg>`;
}

// ── GENERADORS ───────────────────────────────────────────────────────────────
function genCalc(){
  const t=rnd(1,8);
  if(t===1){
    const r=rnd(4,12);
    const c=+(2*PI*r).toFixed(2),a=+(PI*r*r).toFixed(2);
    return{diff:1,context:'Una font circular té radi '+r+' m.',
      enunciat:'a) Calcula la longitud de la vora (circumferència).\nb) Calcula la superfície d\'aigua (àrea del cercle).\nUsa π ≈ 3,14.',
      svg:svgCircle(r),hint:'Longitud = 2πr | Àrea = πr²',
      fields:[{label:'a) Longitud',unit:'m',key:'c',ans:c},{label:'b) Àrea',unit:'m²',key:'a',ans:a}],
      steps:[`a) C = 2 × 3,14 × ${r} = <b>${c} m</b>`,`b) A = 3,14 × ${r}² = 3,14 × ${r*r} = <b>${a} m²</b>`]};
  }
  if(t===2){
    const pts=[[3,4,5],[5,12,13],[8,15,17],[6,8,10],[9,12,15]];
    const [pa,pb,pc]=pts[rnd(0,pts.length-1)];
    return{diff:1,context:'',
      enunciat:`Triangle rectangle de cates a = ${pa} cm i b = ${pb} cm.\na) Quant mesura la hipotenusa (c)?\nb) Calcula l'àrea del triangle.`,
      svg:svgTriRect(pa,pb),hint:'Pitàgores: c²=a²+b² | Àrea=(base×altura)/2',
      fields:[{label:'a) Hipotenusa c',unit:'cm',key:'c',ans:pc},{label:'b) Àrea',unit:'cm²',key:'a',ans:+(pa*pb/2).toFixed(2)}],
      steps:[`a) c² = ${pa}²+${pb}² = ${pa*pa+pb*pb} → c = √${pa*pa+pb*pb} = <b>${pc} cm</b>`,`b) Àrea = (${pa}×${pb})/2 = <b>${+(pa*pb/2).toFixed(2)} cm²</b>`]};
  }
  if(t===3){
    const r=rnd(3,9),h=rnd(5,15);
    const v=+(PI*r*r*h).toFixed(2),al=+(2*PI*r*h).toFixed(2),at=+(2*PI*r*r+2*PI*r*h).toFixed(2);
    return{diff:2,context:'Un pot cilíndric té r = '+r+' cm i h = '+h+' cm.',
      enunciat:'a) Calcula el volum.\nb) Àrea lateral (etiqueta).\nc) Àrea total (tapes incloses). Usa π ≈ 3,14.',
      svg:svgCil(r,h),hint:'V=πr²h | A_lat=2πrh | A_tot=2πr²+2πrh',
      fields:[{label:'a) Volum',unit:'cm³',key:'v',ans:v},{label:'b) Àrea lateral',unit:'cm²',key:'al',ans:al},{label:'c) Àrea total',unit:'cm²',key:'at',ans:at}],
      steps:[`a) V = 3,14×${r}²×${h} = <b>${v} cm³</b>`,`b) A_lat = 2×3,14×${r}×${h} = <b>${al} cm²</b>`,`c) A_tot = 2×3,14×${r}²+${al} = <b>${at} cm²</b>`]};
  }
  if(t===4){
    const b=rnd(4,10),al=rnd(5,14);
    const v=+(b*b*al).toFixed(1),at=+(2*b*b+4*b*al).toFixed(1);
    return{diff:1,context:'Una caixa cúbica de base '+b+'×'+b+' cm i alçada '+al+' cm.',
      enunciat:'a) Calcula el volum.\nb) Calcula l\'àrea total (6 cares).',
      svg:svgPrism(b,al),hint:'V=b²×h | A_tot=2b²+4bh',
      fields:[{label:'a) Volum',unit:'cm³',key:'v',ans:v},{label:'b) Àrea total',unit:'cm²',key:'at',ans:at}],
      steps:[`a) V = ${b}×${b}×${al} = <b>${v} cm³</b>`,`b) A_tot = 2×${b*b}+4×${b}×${al} = <b>${at} cm²</b>`]};
  }
  if(t===5){
    const r=rnd(3,8);
    const v=+(4/3*PI*r*r*r).toFixed(2),a=+(4*PI*r*r).toFixed(2);
    return{diff:2,context:'Una bola de bàsquet té r = '+r+' cm.',
      enunciat:'a) Volum de la bola.\nb) Àrea de la superfície. Usa π ≈ 3,14.',
      svg:svgEsfera(r),hint:'V=(4/3)πr³ | A=4πr²',
      fields:[{label:'a) Volum',unit:'cm³',key:'v',ans:v},{label:'b) Àrea',unit:'cm²',key:'a',ans:a}],
      steps:[`a) V = (4/3)×3,14×${r}³ = <b>${v} cm³</b>`,`b) A = 4×3,14×${r}² = <b>${a} cm²</b>`]};
  }
  if(t===6){
    const r=rnd(3,8),h=rnd(5,12);
    const v=+(1/3*PI*r*r*h).toFixed(2),g=+(Math.sqrt(r*r+h*h)).toFixed(2),al=+(PI*r*g).toFixed(2);
    return{diff:3,context:'Un megàfon (con) té r = '+r+' cm i h = '+h+' cm.',
      enunciat:'a) Volum.\nb) Generatriu g = √(r²+h²).\nc) Àrea lateral. Usa π ≈ 3,14.',
      svg:svgCon(r,h),hint:'V=(1/3)πr²h | g=√(r²+h²) | A_lat=πrg',
      fields:[{label:'a) Volum',unit:'cm³',key:'v',ans:v},{label:'b) Generatriu g',unit:'cm',key:'g',ans:g},{label:'c) Àrea lateral',unit:'cm²',key:'al',ans:al}],
      steps:[`a) V = (1/3)×3,14×${r}²×${h} = <b>${v} cm³</b>`,`b) g = √(${r*r}+${h*h}) = <b>${g} cm</b>`,`c) A_lat = 3,14×${r}×${g} = <b>${al} cm²</b>`]};
  }
  if(t===7){
    const b=rnd(4,10),h=rnd(5,12);
    const ab=b*b,v=+(ab*h/3).toFixed(2);
    return{diff:2,context:'Piràmide de base quadrada '+b+' cm i alçada '+h+' cm.',
      enunciat:'a) Àrea de la base.\nb) Volum.',
      svg:svgPyramid(b,h),hint:'Àrea_base=b² | V=(1/3)×Àrea_base×h',
      fields:[{label:'a) Àrea base',unit:'cm²',key:'ab',ans:ab},{label:'b) Volum',unit:'cm³',key:'v',ans:v}],
      steps:[`a) A_base = ${b}² = <b>${ab} cm²</b>`,`b) V = (1/3)×${ab}×${h} = <b>${v} cm³</b>`]};
  }
  const B=rnd(8,16),b2=rnd(4,B-2),h=rnd(4,10),a=+((B+b2)*h/2).toFixed(1);
  return{diff:2,context:'Camp amb forma de trapezi: B='+B+' m, b='+b2+' m, h='+h+' m.',
    enunciat:'Calcula l\'àrea del camp (trapezi).',svg:null,
    hint:'Àrea trapezi = ((B+b)×h)/2',
    fields:[{label:'Àrea',unit:'m²',key:'a',ans:a}],

function genContext(){
  const t=rnd(1,6);
  if(t===1){
    const r=rnd(4,10),long=+(2*PI*r).toFixed(2),nRev=rnd(3,8),dist=+(long*nRev).toFixed(2);
    return{diff:2,context:'',
      enunciat:`Roda de bici de r = ${r} cm que fa ${nRev} voltes.\na) Circumferència de la roda.\nb) Distància recorreguda. Usa π ≈ 3,14.`,
      svg:svgCircle(r),hint:'C=2πr | Dist.=C×voltes',
      fields:[{label:'a) Circumferència',unit:'cm',key:'c',ans:long},{label:'b) Distància',unit:'cm',key:'d',ans:dist}],
      steps:[`a) C = 2×3,14×${r} = <b>${long} cm</b>`,`b) D = ${long}×${nRev} = <b>${dist} cm</b>`]};
  }
  if(t===2){
    const r=rnd(3,7),h=rnd(8,20),v=+(PI*r*r*h).toFixed(2),ltr=+(v/1000).toFixed(3);

      enunciat:'a) Capacitat en cm³.\nb) Converteix a litres (1 L = 1000 cm³). Usa π ≈ 3,14.',
      svg:svgCil(r,h),hint:'V=πr²h | 1 L=1000 cm³',
      fields:[{label:'a) Volum',unit:'cm³',key:'v',ans:v},{label:'b) Litres',unit:'L',key:'l',ans:ltr}],
      steps:[`a) V = 3,14×${r}²×${h} = <b>${v} cm³</b>`,`b) ${v}/1000 = <b>${ltr} L</b>`]};
  }
  if(t===3){
    const b=rnd(5,12),h=rnd(3,8),cost=rnd(2,5);
    const ab=b*b,totalA=ab+4*b*h,price=+(totalA*cost).toFixed(2);
    return{diff:3,context:`Caixa sense tapa de ${b}×${b} cm i h=${h} cm. Pintura: ${cost} €/cm².`,

      steps:[`a) A = ${ab}+4×${b}×${h} = <b>${totalA} cm²</b>`,`b) Cost = ${totalA}×${cost} = <b>${price} €</b>`]};
  }
  if(t===4){
    const r=rnd(4,9),side=rnd(r*2+2,r*2+8);
    const aCirc=+(PI*r*r).toFixed(2),aQuad=side*side,rest=+(aQuad-aCirc).toFixed(2);
    return{diff:3,context:`Jardí quadrat de ${side}×${side} m amb font circular de r=${r} m.`,
      enunciat:'a) Àrea del jardí.\nb) Àrea de la font.\nc) Àrea de gespa al voltant. Usa π ≈ 3,14.',
      svg:null,hint:'Gespa = Àrea quadrat − Àrea cercle',
      fields:[{label:'a) Àrea quadrat',unit:'m²',key:'aq',ans:aQuad},{label:'b) Àrea font',unit:'m²',key:'ac',ans:aCirc},{label:'c) Àrea gespa',unit:'m²',key:'ag',ans:rest}],
      steps:[`a) ${side}² = <b>${aQuad} m²</b>`,`b) 3,14×${r}² = <b>${aCirc} m²</b>`,`c) ${aQuad}−${aCirc} = <b>${rest} m²</b>`]};
  }
  if(t===5){
    const r=rnd(3,6),preu=rnd(2,6);
    const v=+(4/3*PI*r*r*r).toFixed(2),cost=+(v*preu/1000).toFixed(2);
    return{diff:3,context:`Bola de vidre de r=${r} cm. Vidre: ${preu} €/L (1 L=1000 cm³). Usa π≈3,14.`,
      enunciat:'a) Volum de la bola.\nb) Cost del vidre.',
      svg:svgEsfera(r),hint:'V=(4/3)πr³ | Cost=(V/1000)×preu',
      fields:[{label:'a) Volum',unit:'cm³',key:'v',ans:v},{label:'b) Cost',unit:'€',key:'c',ans:cost}],
      steps:[`a) V = (4/3)×3,14×${r}³ = <b>${v} cm³</b>`,`b) (${v}/1000)×${preu} = <b>${cost} €</b>`]};
  }
  const r=rnd(3,7),h=rnd(6,14);
  const vCil=+(PI*r*r*h).toFixed(2),vCon=+(1/3*PI*r*r*h).toFixed(2),diff2=+(vCil-vCon).toFixed(2);
  return{diff:3,context:`Cilindre i con amb r=${r} cm i h=${h} cm. Usa π≈3,14.`,

function genAngles(){
  const t=rnd(1,5);
  if(t===1){
    const g1=rnd(20,80),m1=rnd(10,55),s1=rnd(5,55);
    const g2=rnd(10,60),m2=rnd(5,50),s2=rnd(5,50);
    let sS=s1+s2,sM=m1+m2,sG=g1+g2;
    if(sS>=60){sS-=60;sM++;}if(sM>=60){sM-=60;sG++;}
    const cM=90*60-g1*60-m1,suM=180*60-g1*60-m1;
    return{diff:1,context:'',
      enunciat:`a) ${g1}° ${m1}' ${s1}" + ${g2}° ${m2}' ${s2}"\nb) Complementari de ${g1}° ${m1}'\nc) Suplementari de ${g1}° ${m1}'`,
      svg:null,hint:"Suma: seg→min→gr si ≥60 | Comp.+α=90° | Sup.+α=180°",
      fields:[{label:"a) Graus (G)",unit:'°',key:'sg',ans:sG},{label:"a) Minuts (M)",unit:"'",key:'sm',ans:sM},{label:"a) Segons (S)",unit:'"',key:'ss',ans:sS},{label:"b) Comp. (graus)",unit:'°',key:'cg',ans:Math.floor(cM/60)},{label:"b) Comp. (minuts)",unit:"'",key:'cm2',ans:cM%60},{label:"c) Sup. (graus)",unit:'°',key:'sug',ans:Math.floor(suM/60)},{label:"c) Sup. (minuts)",unit:"'",key:'sum2',ans:suM%60}],
      steps:[`a) Seg: ${s1}+${s2}=${s1+s2}${s1+s2>=60?' → '+sS+'" (+1 min)':'"'}; Min: ${sM}'; Graus: ${sG}° → <b>${sG}° ${sM}' ${sS}"</b>`,`b) Comp: 90°−${g1}°${m1}' = <b>${Math.floor(cM/60)}° ${cM%60}'</b>`,`c) Sup: 180°−${g1}°${m1}' = <b>${Math.floor(suM/60)}° ${suM%60}'</b>`]};
  }
  if(t===2){
    const a=rnd(25,75);
    return{diff:1,context:'Transversal talla dues rectes paral·leles. Angle = '+a+'°.',
      enunciat:'a) Angle altern intern.\nb) Angle corresponent.\nc) Angle conjugat intern.',
      svg:null,hint:'Alterns = | Corresponents = | Conjugats sumen 180°',
      fields:[{label:'a) Altern intern',unit:'°',key:'ai',ans:a},{label:'b) Corresponent',unit:'°',key:'co',ans:a},{label:'c) Conjugat intern',unit:'°',key:'ci',ans:180-a}],
      steps:[`a) Alterns interns (//): iguals → <b>${a}°</b>`,`b) Corresponents (//): iguals → <b>${a}°</b>`,`c) Conjugats: 180−${a} = <b>${180-a}°</b>`]};
  }
  if(t===3){
    const g=rnd(10,50),d=[25,50,75][rnd(0,2)];
    const totMin=d*60/100,mInt=Math.floor(totMin),seg=Math.round((totMin-mInt)*60);
    return{diff:2,context:'',
      enunciat:`Converteix ${g},${String(d).padStart(2,'0')}° a graus° minuts' segons".\nDesprés calcula el seu angle oposat pel vèrtex.`,
      svg:null,hint:'0,xx°×60=min | 0,mm\'×60=seg | Oposat pel vèrtex = igual',
      fields:[{label:'Graus',unit:'°',key:'gr',ans:g},{label:'Minuts',unit:"'",key:'mn',ans:mInt},{label:'Segons',unit:'"',key:'sg',ans:seg},{label:'Oposat (en graus decimals)',unit:'°',key:'op',ans:g+d/100}],
      steps:[`0,${d}°×60 = ${totMin}'`,`0,${Math.round((totMin-mInt)*100)}'×60 = ${seg}"`,`Resultat: <b>${g}° ${mInt}' ${seg}"</b>`,`Oposat pel vèrtex: <b>${g},${String(d).padStart(2,'0')}°</b>`]};
  }
  if(t===4){
    const a1=rnd(30,80),a2=rnd(20,70);
    const a3=180-a1-a2;
    if(a3<=0) return genAngles();
    return{diff:2,context:`Triangle amb angles ${a1}° i ${a2}°.`,
      enunciat:'a) Tercer angle interior.\nb) Angle exterior adjacent al primer.\nc) Tipus de triangle (acutangle/rectangle/obtusangle) — escriu-ho al camp de text.',
      svg:null,hint:'α+β+γ=180° | Exterior=180°−interior adjacent',
      fields:[{label:'a) Tercer angle',unit:'°',key:'a3',ans:a3},{label:'b) Angle exterior',unit:'°',key:'ext',ans:180-a1}],
      proc:true,procLabel:'c) Justificació del tipus de triangle:',procKey:'tipus',
      procCheck:(v)=>v.toLowerCase().includes(a3<90&&a1<90&&a2<90?'acut':a3===90||a1===90||a2===90?'rect':'obtus'),
      steps:[`a) 180−${a1}−${a2} = <b>${a3}°</b>`,`b) 180−${a1} = <b>${180-a1}°</b>`,`c) <b>${a1<90&&a2<90&&a3<90?'Acutangle (tots angles <90°)':a1===90||a2===90||a3===90?'Rectangle (un angle =90°)':'Obtusangle (un angle >90°)'}</b>`]};
  }
  const pols=[{n:5,nom:'pentàgon',si:108},{n:6,nom:'hexàgon',si:120},{n:8,nom:'octàgon',si:135}];
  const p=pols[rnd(0,2)];
  return{diff:2,context:'',
    enunciat:`${p.nom} regular (${p.n} costats):\na) Suma angles interiors.\nb) Cada angle interior.\nc) Cada angle exterior.`,
    svg:null,hint:'Suma=(n−2)×180 | Interior=Suma/n | Exterior=180−interior',
    fields:[{label:'a) Suma angles',unit:'°',key:'s',ans:(p.n-2)*180},{label:'b) Angle interior',unit:'°',key:'ai',ans:p.si},{label:'c) Angle exterior',unit:'°',key:'ae',ans:180-p.si}],
    steps:[`a) (${p.n}−2)×180 = <b>${(p.n-2)*180}°</b>`,`b) ${(p.n-2)*180}/${p.n} = <b>${p.si}°</b>`,`c) 180−${p.si} = <b>${180-p.si}°</b>`]};
}

function genIdentifica(){
  const t=rnd(1,5);
  if(t===1){
    return{diff:1,context:'',
      enunciat:'Classifica cada figura:\na) 2 bases circulars + lateral corbada.\nb) 1 base circular + vèrtex.\nc) 2 bases poligonals iguals + cares lat. rectangulars.\nd) 1 base poligonal + cares lat. triangulars.',
      svg:null,hint:'Cilindre | Con | Prisma | Piràmide',
      proc:true,procLabel:'Escriu: a) ... b) ... c) ... d) ...',procKey:'resp',
      procCheck:(v)=>{const lv=v.toLowerCase();return lv.includes('cilindre')&&lv.includes('con')&&(lv.includes('prisma')||lv.includes('prisme'))&&(lv.includes('piràmide')||lv.includes('piramide'));},
      fields:[],
      steps:['a) <b>Cilindre</b>','b) <b>Con</b>','c) <b>Prisma</b>','d) <b>Piràmide</b>']};
  }
  if(t===2){
    const C=rnd(5,8),V=rnd(4,8),A=C+V-2;
    return{diff:2,context:`Poliedre amb ${C} cares i ${V} vèrtexs.`,
      enunciat:'a) Quantes arestes té? (C+V=A+2)\nb) Comprova la fórmula.\nc) Exemple de poliedre amb aquest nombre de cares.',
      svg:null,hint:'A = C+V−2',
      fields:[{label:'a) Arestes',unit:'',key:'a',ans:A}],
      proc:true,procLabel:'b) Comprovació i c) Exemple:',procKey:'comp',
      procCheck:(v)=>v.includes(String(C+V))&&v.includes(String(A+2)),
      steps:[`a) A = ${C}+${V}−2 = <b>${A}</b>`,`b) ${C}+${V}=${C+V} = ${A}+2=${A+2} ✓`,`c) ${C===6?'Cub':C===5?'Piràmide quad. / Prisma triang.':'Poliedre vàlid'}`]};
  }
  if(t===3){
    const costats=[{n:3,nom:'equilàter',ang:60},{n:4,nom:'quadrat',ang:90},{n:5,nom:'pentàgon',ang:108},{n:6,nom:'hexàgon',ang:120}];
    const p=costats[rnd(0,costats.length-1)];
    return{diff:1,context:'',
      enunciat:`Polígon regular de ${p.n} costats:\na) Com s'anomena?\nb) Cada angle interior?\nc) Cada angle exterior?\nd) Suma total dels angles interiors?`,
      svg:null,hint:'Angle interior=(n−2)×180/n | Exterior=180−interior',
      fields:[{label:'b) Angle interior',unit:'°',key:'ai',ans:p.ang},{label:'c) Angle exterior',unit:'°',key:'ae',ans:180-p.ang},{label:'d) Suma total',unit:'°',key:'st',ans:(p.n-2)*180}],
      proc:true,procLabel:`a) Nom del polígon de ${p.n} costats:`,procKey:'nom',
      procCheck:(v)=>v.toLowerCase().includes(p.nom.substring(0,4)),
      steps:[`a) <b>${p.nom}</b>`,`b) (${p.n}−2)×180/${p.n} = <b>${p.ang}°</b>`,`c) 180−${p.ang} = <b>${180-p.ang}°</b>`,`d) (${p.n}−2)×180 = <b>${(p.n-2)*180}°</b>`]};
  }
  if(t===4){
    const quad=[
      {nom:'quadrat',p1:'4 costats iguals',p2:'4 angles rectes (90°)',diag:'Iguals i perpendiculars'},
      {nom:'rectangle',p1:'2 parells de costats iguals',p2:'4 angles rectes (90°)',diag:'Iguals però no perpendiculars'},
      {nom:'rombe',p1:'4 costats iguals',p2:'Angles no necessàriament rectes',diag:'Perpendiculars però no iguals'},
      {nom:'trapezi',p1:'1 parell de costats paral·lels',p2:'Angles no fixos',diag:'Ni iguals ni perpendiculars en general'},
    ];
    const q=quad[rnd(0,quad.length-1)];
    return{diff:2,context:'',
      enunciat:`Descriu "${q.nom}":\na) Propietat dels costats.\nb) Propietat dels angles.\nc) Propietat de les diagonals.`,
      svg:null,hint:'Pensa en costats, angles i diagonals',
      proc:true,procLabel:'Escriu la descripció completa (a, b, c):',procKey:'desc',
      procCheck:(v)=>v.length>30,
      fields:[],
      steps:[`a) <b>${q.p1}</b>`,`b) <b>${q.p2}</b>`,`c) <b>${q.diag}</b>`]};
  }
  const notables=[
    {nom:'mediatriu',def:'Perpendicular al costat pel seu punt mig',punt:'Circumcentre'},
    {nom:'bisectriu',def:'Divideix l\'angle en 2 parts iguals',punt:'Incentre'},
    {nom:'mitjana',def:'Del vèrtex al punt mig del costat oposat',punt:'Baricentre'},
    {nom:'altura',def:'Perpendicular del vèrtex al costat oposat',punt:'Ortocentre'},
  ];
  const n=notables[rnd(0,notables.length-1)];
  return{diff:2,context:'',
    enunciat:`Sobre la <b>${n.nom}</b> d'un triangle:\na) Descripció.\nb) Punt notable on es tallen les tres ${n.nom}s.\nc) Per a quin triangle coincideixen tots 4 punts notables?`,
    svg:null,hint:'Mediatriu→Circumcentre | Bisectriu→Incentre | Mitjana→Baricentre | Altura→Ortocentre',
    proc:true,procLabel:'Escriu la teva resposta (a, b, c):',procKey:'resp',
    procCheck:(v)=>v.length>20,
    fields:[],
    steps:[`a) ${n.nom}: <b>${n.def}</b>`,`b) <b>${n.punt}</b>`,`c) Triangle <b>equilàter</b> (tots 4 punts coincideixen)`]};
}

function genMixt(){
  return [genCalc,genContext,genAngles,genIdentifica][rnd(0,3)]();
}

const GEN_MAP={calc:genCalc,context:genContext,angles:genAngles,identifica:genIdentifica,mixt:genMixt};
const CATS=[
  {id:'calc',icon:'🔢',name:'Càlcul pas a pas',desc:'Àrees, volums i longituds — escriu cada pas'},
  {id:'context',icon:'🏠',name:'Problemes de context real',desc:'Situacions quotidianes que combinen conceptes'},
  {id:'angles',icon:'📐',name:'Angles i operacions',desc:'Sexagesimals, relacions i rectes paral·leles'},
  {id:'identifica',icon:'🔍',name:'Identifica i classifica',desc:'Nomena, justifica i aplica criteris'},
  {id:'mixt',icon:'🎯',name:'Repàs mixt',desc:'Selecció aleatòria de tots els temes'},
];

// ── ESTAT ────────────────────────────────────────────────────────────────────
let state={cat:null,probs:[],idx:0,score:0,total:0};
const N_PROBS=5;

// ── HOME ─────────────────────────────────────────────────────────────────────
function renderHome(){
  document.getElementById('catsGrid').innerHTML=CATS.map(c=>`
    <div class="cat-card" onclick="startCat('${c.id}')">
      <div class="cat-icon">${c.icon}</div>
      <div class="cat-info"><h3>${c.name}</h3><p>${c.desc}</p></div>
      <span class="cat-badge">${N_PROBS} problemes</span>
    </div>`).join('');
}

function startCat(id){
  state={cat:id,probs:[],idx:0,score:0,total:0};
  for(let i=0;i<N_PROBS;i++){
    let p,tries=0;
    do{try{p=GEN_MAP[id]();}catch(e){p=null;}tries++;}while((!p||!p.enunciat)&&tries<20);
    if(p) state.probs.push(p);
  }
  document.getElementById('navBack').style.display='block';
  document.getElementById('navTitle').textContent=CATS.find(c=>c.id===id).name;
  showProb();showScreen('sProb');
}

// ── MOSTRA PROBLEMA ──────────────────────────────────────────────────────────
function showProb(){
  const p=state.probs[state.idx];
  if(!p){showResult();return;}
  activeField=null;
  document.getElementById('probNum').textContent=`Problema ${state.idx+1}/${state.probs.length}`;
  const dc=p.diff===1?'diff-1':p.diff===2?'diff-2':'diff-3';
  const dl=p.diff===1?'Bàsic':p.diff===2?'Mitjà':'Difícil';
  document.getElementById('probDiff').className=`prob-diff ${dc}`;
  document.getElementById('probDiff').textContent=dl;
  let boxHTML='';
  if(p.context) boxHTML+=`<div class="context">${p.context}</div>`;
  boxHTML+=`<div class="enunciat">${p.enunciat.replace(/\n/g,'<br>')}</div>`;
  if(p.svg) boxHTML+=p.svg;
  document.getElementById('probBox').innerHTML=boxHTML;
  document.getElementById('hintText').textContent=p.hint||'';
  document.getElementById('hintStrip').classList.remove('show');

  // Teclat matemàtic (sempre visible)
  let aHTML=mathKbd();

  // Camps numèrics
  if(p.fields&&p.fields.length>0){
    aHTML+='<div style="margin-bottom:6px;font-size:.83rem;color:var(--muted);font-weight:600">Respostes numèriques <span style="font-size:.75rem;font-weight:400">(clica el camp i usa el teclat superior)</span>:</div>';
    aHTML+='<div class="num-fields">';
    p.fields.forEach(f=>{
      aHTML+=`<div class="num-field">
        <span class="num-field-label">${f.label}:</span>
        <div class="num-input-row">
          <input class="num-input" id="f_${f.key}" type="text" placeholder="0"
            onfocus="setActiveField(this)" onclick="setActiveField(this)">
          <span class="unit-tag">${f.unit}</span>
        </div>
      </div>`;
    });
    aHTML+='</div>';
  }

  // Camp de text lliure
  if(p.proc){
    aHTML+=`<div style="margin-top:10px;font-size:.83rem;color:var(--muted);font-weight:600;margin-bottom:5px">${p.procLabel}</div>
    <textarea class="proc-input" id="proc_${p.procKey}"
      placeholder="Escriu aquí la teva resposta o justificació..."
      onfocus="setActiveField(this)" onclick="setActiveField(this)"></textarea>`;
  }
  document.getElementById('answerArea').innerHTML=aHTML;
  document.getElementById('fbBox').className='fb-box';
  document.getElementById('fbBox').innerHTML='';
  document.getElementById('btnNext').style.display='none';
  document.getElementById('btnCheck').style.display='block';
}

// ── COMPROVA ─────────────────────────────────────────────────────────────────
function showHint(){document.getElementById('hintStrip').classList.add('show');}

function checkAnswer(){
  const p=state.probs[state.idx];
  let numOk=0,numTotal=0;
  if(p.fields&&p.fields.length>0){
    p.fields.forEach(f=>{
      numTotal++;
      const el=document.getElementById('f_'+f.key);
      if(!el) return;
      const val=parseFloat(el.value.replace(',','.').replace(/[°'"cm²³mL€]/g,'').trim());
      if(!isNaN(val)&&near(val,f.ans)){el.classList.add('ok');el.classList.remove('err');numOk++;}
      else{el.classList.add('err');el.classList.remove('ok');}
    });
  }
  let procOk=null;
  if(p.proc){
    const el=document.getElementById('proc_'+p.procKey);
    const val=el?el.value.trim():'';
    procOk=val.length>5&&(p.procCheck?p.procCheck(val):val.length>10);
  }
  const hasNum=numTotal>0,hasProc=!!p.proc;
  let pts=0;
  if(hasNum&&hasProc) pts=(numOk===numTotal&&procOk)?2:(numOk===numTotal||procOk)?1:0;
  else if(hasNum) pts=numOk===numTotal?2:numOk>0?1:0;
  else if(hasProc) pts=procOk?2:0;
  state.score+=pts;state.total+=2;
  const allOk=(numOk===numTotal||!hasNum)&&(procOk!==false||!hasProc);
  const anyOk=numOk>0||procOk===true;
  const cls=allOk?'ok':anyOk?'partial':'ko';
  const msg=allOk?'✅ Excel·lent! Totes les respostes correctes.':anyOk?'⚠️ Parcialment correcte. Mira la solució.':'❌ Revisa la solució pas a pas.';
  const stepsHTML=p.steps.map((s,i)=>`<div class="sol-step"><b>Pas ${i+1}:</b> ${s}</div>`).join('');
  const fb=document.getElementById('fbBox');
  fb.className=`fb-box show ${cls}`;
  fb.innerHTML=`<h4>${msg}</h4>${stepsHTML}`;
  document.getElementById('btnNext').style.display='block';
  document.getElementById('btnCheck').style.display='none';
}

function nextProb(){
  state.idx++;
  if(state.idx>=state.probs.length){showResult();return;}
  showProb();
}

// ── RESULTAT ─────────────────────────────────────────────────────────────────
function showResult(){
  const pct=state.total>0?Math.round(state.score/state.total*100):0;
  const emoji=pct>=85?'🏆':pct>=65?'👍':'💪';
  const msg=pct>=85?'Molt bé! Resolts com en un examen real.':pct>=65?'Bé! Repassa els passos fallats.':'Cal practicar més. Torna a llegir la teoria.';
  document.getElementById('resultContent').innerHTML=`
    <div class="score-big">
      <div class="trophy">${emoji}</div>
      <h2>Resultat final</h2>
      <div class="score-num">${state.score}/${state.total} pts<span>${pct}%</span></div>
      <p style="color:var(--muted);margin:10px 0 20px">${msg}</p>
      <button class="btn-p" onclick="startCat(state.cat)" style="margin-bottom:10px">Repetir categoria →</button>
      <button class="btn-s" onclick="goBack()">← Menú principal</button>
    </div>`;
  showScreen('sResult');
}

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function goBack(){
  document.getElementById('navBack').style.display='none';
  document.getElementById('navTitle').textContent='Problemes Sentit Espacial · 1r ESO';
  activeField=null;
  renderHome();showScreen('sHome');
}
renderHome();
</script>
</body>
</html>
