:root{

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
nav{background:var(--card);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow);position:sticky;top:0;z-index:100;}
nav h1{font-size:1.05rem;font-weight:700;color:var(--primary);flex:1;cursor:default;}
.nav-back{background:none;border:none;cursor:pointer;color:var(--muted);font-size:1.2rem;padding:4px 8px;border-radius:6px;}
.nav-back:hover{background:var(--bg);}
.progress-bar-wrap{height:6px;background:var(--border);border-radius:3px;width:110px;}
.progress-bar-fill{height:6px;background:var(--primary);border-radius:3px;transition:width 0.4s;}
.screen{display:none;padding:20px;max-width:700px;margin:0 auto;}
.screen.active{display:block;}
.home-header{text-align:center;padding:28px 0 18px;}
.home-header h2{font-size:1.6rem;color:var(--primary);margin-bottom:6px;}
.home-header p{color:var(--muted);font-size:0.9rem;}
.topics-grid{display:flex;flex-direction:column;gap:10px;margin-top:18px;}
.topic-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:15px 18px;cursor:pointer;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow);transition:transform 0.15s,box-shadow 0.15s;}

.topic-badge{font-size:0.73rem;padding:3px 10px;border-radius:20px;font-weight:600;white-space:nowrap;}

.level-select{display:flex;gap:12px;margin-bottom:22px;}

.level-btn.active{border-color:var(--primary);color:var(--primary);background:#f0ebff;}
.streak-bar-wrap{height:8px;background:var(--border);border-radius:4px;margin-bottom:12px;}
.streak-bar-fill{height:8px;background:var(--success);border-radius:4px;transition:width 0.4s;}
.streak-label{font-size:0.75rem;color:var(--muted);margin-bottom:6px;}
.ex-num{font-size:0.78rem;color:var(--muted);margin-bottom:4px;}
.ex-question{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;font-size:0.97rem;text-align:center;margin-bottom:14px;box-shadow:var(--shadow);}
.ex-question .func{font-size:1.0rem;font-weight:700;color:var(--primary-dark);}
.ex-table{border-collapse:collapse;margin:8px auto;font-size:0.83rem;}
.ex-table th{background:#f0ebff;color:var(--primary-dark);padding:5px 10px;border:1px solid var(--border);}
.ex-table td{padding:5px 10px;border:1px solid var(--border);text-align:center;}
#answerArea{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:var(--shadow);}
.guide-steps{background:#fffbea;border:1px solid #f5e0a0;border-radius:12px;padding:13px 15px;margin-bottom:14px;font-size:0.86rem;line-height:1.8;}
.guide-steps h4{color:var(--warn);margin-bottom:5px;font-size:0.83rem;}
.feedback-box{border-radius:12px;padding:14px 16px;margin-bottom:14px;font-size:0.88rem;line-height:1.6;}
.feedback-box.ok{background:#e6f9ef;border:1px solid #a0e6c0;color:#1a7a4a;}
.feedback-box.ko{background:#fdeaea;border:1px solid #f0b0b0;color:#a02020;}

.sol-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 13px;font-size:0.83rem;cursor:pointer;color:var(--muted);margin-top:7px;}
.solution-box{background:#f8f8ff;border:1px solid var(--border);border-radius:12px;padding:13px 15px;margin-top:9px;font-size:0.86rem;line-height:1.9;display:none;}
.solution-box.show{display:block;}
.solution-box .step{padding:3px 0;border-bottom:1px solid #eee;}
.solution-box .step:last-child{border:none;}
.solution-box .highlight{color:var(--primary);font-weight:700;}
.btn-primary{background:var(--primary);color:white;border:none;border-radius:12px;padding:13px 26px;font-size:0.93rem;font-weight:600;cursor:pointer;width:100%;margin-top:6px;}
.btn-primary:hover{background:var(--primary-dark);}
.btn-secondary{background:var(--card);color:var(--primary);border:2px solid var(--primary);border-radius:12px;padding:11px 26px;font-size:0.93rem;font-weight:600;cursor:pointer;width:100%;margin-top:9px;}
.congrats{text-align:center;padding:36px 18px;}
.congrats .trophy{font-size:2.8rem;margin-bottom:14px;}
.congrats h2{font-size:1.4rem;color:var(--primary);margin-bottom:9px;}
.congrats p{color:var(--muted);margin-bottom:22px;}
.home-link{
    text-decoration:none;
    color:var(--primary);
    font-weight:700;
    white-space:nowrap;
}

.home-link:hover{
    text-decoration:underline;
}

<script>
// ── UTILS ────────────────────────────────────
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function shuffle(a){return [...a].sort(()=>Math.random()-0.5);}
function frac(n,d){var g=gcd(n,d);return (n/g)+'/'+(d/g);}
function gcd(a,b){return b===0?a:gcd(b,a%b);}
function round2(x){return Math.round(x*100)/100;}

function normalizeDecimal(str){return parseFloat(String(str||'').replace(',','.').trim());}
function parseFractionOrDecimal(str){
  str=String(str||'').trim();
  if(str.indexOf('/')>=0){
    var parts=str.split('/');
    if(parts.length===2){
      var num=parseFloat(parts[0].replace(',','.'));
      var den=parseFloat(parts[1].replace(',','.'));
      if(!isNaN(num)&&!isNaN(den)&&den!==0)return num/den;
    }
    return NaN;
  }
  return normalizeDecimal(str);
}
function checkText(input,correct){
  function norm(s){return String(s||'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');}
  return norm(input)===norm(correct);
}
function freqTableHtml(vals,freqs,rowLabel1,rowLabel2,extraRowLabel,extraRow){
  rowLabel1=rowLabel1||'Valor';rowLabel2=rowLabel2||'Freqüència';
  var html='<table class="ex-table"><tr><th>'+rowLabel1+'</th>'+vals.map(function(v){return '<td>'+v+'</td>';}).join('')+'</tr><tr><th>'+rowLabel2+'</th>'+freqs.map(function(f){return '<td>'+f+'</td>';}).join('')+'</tr>';
  if(extraRow){html+='<tr><th>'+extraRowLabel+'</th>'+extraRow.map(function(f){return '<td>'+f+'</td>';}).join('')+'</tr>';}
  html+='</table>';
  return html;
}

// ── PIE VISUAL HELPERS ───────────────────────
var PIE_COLORS=['#7c5cbf','#34c97e','#f5a623','#e05c5c','#3fa7d6','#a78bda'];
function svgPieChart(labels,vals,highlightIdx){
  var cx=85,cy=85,r=72,total=vals.reduce(function(a,b){return a+b;},0);
  var angleStart=-90,paths='';
  for(var i=0;i<vals.length;i++){
    var angle=vals[i]/total*360;
    var angleEnd=angleStart+angle;
    var x1=cx+r*Math.cos(angleStart*Math.PI/180),y1=cy+r*Math.sin(angleStart*Math.PI/180);
    var x2=cx+r*Math.cos(angleEnd*Math.PI/180),y2=cy+r*Math.sin(angleEnd*Math.PI/180);
    var largeArc=angle>180?1:0;
    var fill=PIE_COLORS[i%PIE_COLORS.length];
    paths+='<path d="M'+cx+','+cy+' L'+x1.toFixed(1)+','+y1.toFixed(1)+' A'+r+','+r+' 0 '+largeArc+' 1 '+x2.toFixed(1)+','+y2.toFixed(1)+' Z" fill="'+fill+'" stroke="white" stroke-width="2"/>';
    angleStart=angleEnd;
  }
  return '<svg viewBox="0 0 170 170" style="width:150px;height:150px;display:block;margin:4px auto">'+paths+'</svg>';
}
function pieLegend(labels,vals,suffix){
  suffix=suffix||'%';
  var items=labels.map(function(l,i){
    return '<span style="margin:0 8px"><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:'+PIE_COLORS[i%PIE_COLORS.length]+';margin-right:4px;vertical-align:middle"></span>'+l+': '+vals[i]+suffix+'</span>';
  });
  return '<div style="font-size:0.78rem;color:var(--muted);text-align:center;margin-top:6px;line-height:1.7">'+items.join('')+'</div>';
}

// ── CONSTRUCCIÓ DE GRÀFICS (clic per marcar alçada) ──
var activeConstructEx=null,activeConstructContainer=null,constructCurrent=[],lastGeom=null;

function buildConstructSvg(ex,current,revealTarget){
  var W=320,H=200,padL=26,padR=14,padT=18,padB=30;
  var n=ex.labels.length;
  var gap=(W-padL-padR)/n;
  var usableH=H-padT-padB,baseline=H-padB;
  function yFor(v){return baseline-(v/ex.maxScale)*usableH;}
  var gridStep=ex.maxScale>12?2:1;
  var grid='';
  for(var g=0;g<=ex.maxScale;g+=gridStep){
    var gy=yFor(g);
    grid+='<line x1="'+padL+'" y1="'+gy.toFixed(1)+'" x2="'+(W-padR)+'" y2="'+gy.toFixed(1)+'" stroke="var(--border)" stroke-width="1" stroke-dasharray="2,2"/>';
    grid+='<text x="'+(padL-5)+'" y="'+(gy+3).toFixed(1)+'" font-size="8" text-anchor="end" fill="var(--muted)">'+g+'</text>';
  }
  var content='',pts=[];
  for(var i=0;i<n;i++){
    var xCenter=padL+i*gap+gap/2;
    var v=current[i]||0;
    var bw=(ex.mode==='gapped')?gap*0.55:gap-2;
    var xLeft=(ex.mode==='gapped')?xCenter-bw/2:padL+i*gap+1;
    if(ex.mode!=='line'){
      var y=yFor(v),h=baseline-y;
      content+='<rect x="'+xLeft.toFixed(1)+'" y="'+y.toFixed(1)+'" width="'+bw.toFixed(1)+'" height="'+Math.max(0,h).toFixed(1)+'" fill="var(--primary)" rx="2"/>';
      if(v>0)content+='<text x="'+xCenter.toFixed(1)+'" y="'+(y-4).toFixed(1)+'" font-size="9.5" text-anchor="middle" fill="var(--text)" font-weight="700">'+v+'</text>';
    } else {
      pts.push({x:xCenter,y:yFor(v),v:v});
    }
    content+='<text x="'+xCenter.toFixed(1)+'" y="'+(baseline+13).toFixed(1)+'" font-size="8" text-anchor="middle" fill="var(--muted)">'+ex.labels[i]+'</text>';
  }
  if(ex.mode==='line'){
    content+='<polyline points="'+pts.map(function(p){return p.x.toFixed(1)+','+p.y.toFixed(1);}).join(' ')+'" fill="none" stroke="var(--primary)" stroke-width="2.5"/>';
    pts.forEach(function(p){
      content+='<circle cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="4" fill="var(--primary-dark)"/>';
      if(p.v>0)content+='<text x="'+p.x.toFixed(1)+'" y="'+(p.y-8).toFixed(1)+'" font-size="9.5" text-anchor="middle" fill="var(--text)" font-weight="700">'+p.v+'</text>';
    });
  }
  if(revealTarget){
    for(var i=0;i<n;i++){
      var xCenter=padL+i*gap+gap/2,ty=yFor(ex.target[i]);
      content+='<line x1="'+(xCenter-gap*0.32).toFixed(1)+'" y1="'+ty.toFixed(1)+'" x2="'+(xCenter+gap*0.32).toFixed(1)+'" y2="'+ty.toFixed(1)+'" stroke="var(--error)" stroke-width="2" stroke-dasharray="3,2"/>';
    }
  }
  content+='<line x1="'+padL+'" y1="'+baseline+'" x2="'+(W-padR)+'" y2="'+baseline+'" stroke="var(--text)" stroke-width="1.5"/>';
  return {svg:'<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;aspect-ratio:'+W+'/'+H+';display:block;touch-action:none">'+grid+content+'</svg>',W:W,H:H,padL:padL,padR:padR,padT:padT,padB:padB,gap:gap};
}
function renderConstruct(ex,revealTarget,containerId){
  var built=buildConstructSvg(ex,constructCurrent,revealTarget);
  lastGeom=built;
  document.getElementById(containerId).innerHTML=built.svg;
}
function setupConstructListener(containerId){
  var area=document.getElementById(containerId);
  if(area.dataset.constructBound)return;
  area.dataset.constructBound='1';
  area.addEventListener('pointerdown',function(e){
    if(state.answered||!activeConstructEx||!lastGeom||activeConstructContainer!==containerId)return;
    var rect=area.getBoundingClientRect();
    var fracX=(e.clientX-rect.left)/rect.width,fracY=(e.clientY-rect.top)/rect.height;
    var svgX=fracX*lastGeom.W,svgY=fracY*lastGeom.H;
    var n=activeConstructEx.labels.length;
    var colIdx=Math.floor((svgX-lastGeom.padL)/lastGeom.gap);
    if(colIdx<0||colIdx>=n)return;
    var baseline=lastGeom.H-lastGeom.padB,usableH=lastGeom.H-lastGeom.padT-lastGeom.padB;
    var valFrac=(baseline-svgY)/usableH;
    var val=Math.round(valFrac*activeConstructEx.maxScale);
    val=Math.max(0,Math.min(activeConstructEx.maxScale,val));
    constructCurrent[colIdx]=val;
    renderConstruct(activeConstructEx,false,containerId);
  });
}

// ── CONSTRUCCIÓ DE SECTORS (graus escrits + vista prèvia) ──
function renderPieConstruct(ex,containerId){
  var html='<div style="display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin-bottom:10px">';
  ex.labels.forEach(function(l,i){
    html+='<div style="text-align:center"><div style="font-size:0.78rem;color:var(--muted);margin-bottom:3px">'+l+'</div><input type="text" inputmode="decimal" class="pie-input" data-idx="'+i+'" autocomplete="off" style="width:64px;padding:7px;border:2px solid var(--border);border-radius:8px;text-align:center;font-size:0.9rem" placeholder="°"></div>';
  });
  html+='</div><div class="pie-preview"></div>';
  document.getElementById(containerId).innerHTML=html;
  updatePiePreview(ex,containerId);
  document.querySelectorAll('#'+containerId+' .pie-input').forEach(function(inp){
    inp.addEventListener('input',function(){updatePiePreview(ex,containerId);});
  });
}
function updatePiePreview(ex,containerId){
  var inputs=document.querySelectorAll('#'+containerId+' .pie-input');
  var vals=ex.labels.map(function(l,i){
    var el=inputs[i];
    var v=el?parseFloat((el.value||'0').replace(',','.')):0;
    return (isNaN(v)||v<=0)?0.0001:v;
  });
  var prev=document.querySelector('#'+containerId+' .pie-preview');
  if(prev)prev.innerHTML=svgPieChart(ex.labels,vals,-1)+pieLegend(ex.labels,vals.map(v=>Math.round(v)),'°');
}

// ── ANSWER AREA GENÈRIC ──────────────────────
function renderAnswerArea(ex,containerId){
  if(ex.kind==='construct'){
    constructCurrent=ex.target.map(()=>0);
    activeConstructEx=ex;activeConstructContainer=containerId;
    renderConstruct(ex,false,containerId);
    setupConstructListener(containerId);
  } else if(ex.kind==='pie'){
    activeConstructEx=ex;activeConstructContainer=containerId;
    renderPieConstruct(ex,containerId);
  } else {
    document.getElementById(containerId).innerHTML='<input type="text" id="'+containerId+'_freeInput" inputmode="decimal" autocomplete="off" placeholder="Escriu la teva resposta..." style="width:100%;max-width:260px;display:block;margin:0 auto;padding:12px;border:2px solid var(--border);border-radius:10px;font-size:1rem;text-align:center">';
  }
}
function evaluateAnswer(ex,containerId){
  if(ex.kind==='construct'){
    for(var i=0;i<ex.labels.length;i++){if((constructCurrent[i]||0)!==ex.target[i])return false;}
    return true;
  } else if(ex.kind==='pie'){
    var ok=true;
    var inputs=document.querySelectorAll('#'+containerId+' .pie-input');
    ex.labels.forEach(function(l,i){
      var el=inputs[i];
      var v=el?parseFloat((el.value||'').replace(',','.')):NaN;
      if(isNaN(v)||Math.abs(v-ex.target[i])>1)ok=false;
    });
    return ok;
  } else if(ex.kind==='text'){
    var inp=document.getElementById(containerId+'_freeInput');
    return checkText(inp?inp.value:'',ex.correctText);
  } else {
    var inp2=document.getElementById(containerId+'_freeInput');
    var raw=inp2?inp2.value:'';
    var v2=ex.checkType==='fraction'?parseFractionOrDecimal(raw):normalizeDecimal(raw);
    if(isNaN(v2))return false;
    return Math.abs(v2-ex.correctValue)<0.015;
  }
}
function disableAnswerArea(containerId){
  document.querySelectorAll('#'+containerId+' .pie-input').forEach(function(i){i.disabled=true;});
  var fi=document.getElementById(containerId+'_freeInput');
  if(fi)fi.disabled=true;
}

// ── GENERADORS: CONSTRUCCIÓ ──────────────────
function genBarresConstruct(){
  var categories=shuffle(['Futbol','Bàsquet','Tennis','Natació','Ciclisme','Voleibol']).slice(0,4);
  var target=categories.map(()=>rnd(2,10));
  var maxScale=Math.max(...target)+2;
  var q='Construeix el diagrama de barres a partir d\'aquesta taula. Fes clic dins de cada columna per marcar l\'alçada correcta.';
  var visual=freqTableHtml(categories,target,'Esport','Freqüència');
  var guide=['Fes clic dins de cada columna a l\'alçada que indica la taula','Pots tornar a fer clic per corregir abans de comprovar'];
  var solution=categories.map((c,i)=>c+': '+target[i]);
  return {kind:'construct',mode:'gapped',labels:categories,target:target,maxScale:maxScale,question:q,visual:visual,guide:guide,solution:solution};
}
function genHistogramaConstruct(){
  var width=10,start=rnd(0,2)*10,n=4,labels=[];
  for(var i=0;i<n;i++)labels.push('['+(start+i*width)+','+(start+(i+1)*width)+'[');
  var target=labels.map(()=>rnd(2,10));
  var maxScale=Math.max(...target)+2;
  var q='Construeix l\'histograma a partir d\'aquesta taula. Recorda que les barres han d\'anar JUNTES.';
  var visual=freqTableHtml(labels,target,'Interval','Freqüència');
  var guide=['En un histograma les barres van juntes, sense espai','Fes clic dins de cada interval a l\'alçada correcta'];
  var solution=labels.map((l,i)=>l+': '+target[i]);

function genPoligonConstruct(){

  for(var i=0;i<n;i++)labels.push(String(start+i*width+width/2));
  var target=labels.map(()=>rnd(2,12));
  var maxScale=Math.max(...target)+2;
  var q='Construeix el polígon de freqüències marcant l\'alçada de cada punt (sobre la marca de classe).';
  var visual=freqTableHtml(labels,target,'Marca de classe','Freqüència');

  var solution=labels.map((l,i)=>'Marca '+l+': '+target[i]);

function genSectorsConstruct(){
  var n=rnd(3,4);
  var labels=shuffle(['Futbol','Bàsquet','Natació','Ciclisme','Tennis']).slice(0,n);
  var pcts=[],remaining=100;
  for(var i=0;i<n-1;i++){
    var maxP=remaining-5*(n-1-i),minP=5;
    var steps=Math.floor((maxP-minP)/5)+1;
    var p=minP+5*rnd(0,Math.max(0,steps-1));
    pcts.push(p);remaining-=p;
  }
  pcts.push(remaining);
  var target=pcts.map(p=>Math.round(p*3.6));
  var q='Calcula els graus de cada sector a partir d\'aquesta taula de percentatges i escriu-los per construir el diagrama.';
  var visual=freqTableHtml(labels,pcts.map(p=>p+'%'),'Categoria','Percentatge');
  var guide=['Graus = percentatge × 360 / 100','Fes-ho per a cada categoria; la suma final ha de ser 360°'];
  var solution=labels.map((l,i)=>l+': '+pcts[i]+'% × 3,6 = '+target[i]+'°');
  return {kind:'pie',labels:labels,target:target,question:q,visual:visual,guide:guide,solution:solution};
}

function genMitjanaLliure(){
  var type=rnd(1,3),q,visual,correctValue,guide,solution;
  if(type===1){
    var n=rnd(4,7);
    var dades=Array.from({length:n},()=>rnd(3,10));
    var suma=dades.reduce((a,b)=>a+b,0);
    correctValue=round2(suma/n);
    q='Calcula la mitjana aritmètica de: '+dades.join(', ')+'. (pots usar coma decimal)';
    guide=['Suma totes les dades: '+dades.join(' + ')+' = '+suma,'Divideix pel nombre de dades ('+n+')'];
    solution=guide.concat(['✅ Mitjana = '+suma+' / '+n+' = '+correctValue]);
  } else if(type===2){
    var n2=rnd(4,6);
    var dades2=Array.from({length:n2-1},()=>rnd(3,9));
    var mitjObj=rnd(5,8);
    var manquant=mitjObj*n2-dades2.reduce((a,b)=>a+b,0);
    if(manquant<1||manquant>10){dades2=Array.from({length:n2-1},()=>rnd(4,7));manquant=mitjObj*n2-dades2.reduce((a,b)=>a+b,0);}
    if(manquant<1)manquant=1;
    correctValue=manquant;
    q='La mitjana de '+n2+' notes és '+mitjObj+'. Les primeres '+(n2-1)+' notes són: '+dades2.join(', ')+'. Quina és l\'última nota?';
    guide=['Suma total = mitjana × n = '+mitjObj+' × '+n2+' = '+(mitjObj*n2),'Suma coneguda = '+dades2.reduce((a,b)=>a+b,0)];
    solution=guide.concat(['✅ Nota manquant = '+(mitjObj*n2)+' − '+dades2.reduce((a,b)=>a+b,0)+' = '+manquant]);
  } else {
    var nVals=rnd(3,5),usedVals=new Set();
    while(usedVals.size<nVals)usedVals.add(rnd(1,10));
    var vals=[...usedVals].sort((a,b)=>a-b);
    var freqsArr=vals.map(()=>rnd(1,6));
    var sumProd=vals.reduce((s,v,i)=>s+v*freqsArr[i],0);
    var Ntot=freqsArr.reduce((a,b)=>a+b,0);
    correctValue=round2(sumProd/Ntot);
    q='Observa la taula de freqüències. Calcula la mitjana ponderada.';
    visual=freqTableHtml(vals,freqsArr);
    guide=['Mitjana ponderada = Σ(valor × freqüència) / N','Suma dels productes = '+sumProd+' | N = '+Ntot];
    solution=guide.concat(['✅ Mitjana = '+sumProd+' / '+Ntot+' = '+correctValue]);
  }
  return {kind:'numeric',checkType:'decimal',correctValue:correctValue,question:q,visual:visual,guide:guide,solution:solution};
}
function genMedianaLliure(){
  var type=rnd(1,2),q,visual,correctValue,guide,solution;
  if(type===1){
    var isOdd=(rnd(0,1)===0);
    var n=isOdd?rnd(3,9)*2-1:rnd(2,5)*2;
    var dades=shuffle(Array.from({length:n},()=>rnd(2,15)));
    var sorted=[...dades].sort((a,b)=>a-b);
    var med=n%2===1?sorted[Math.floor(n/2)]:round2((sorted[n/2-1]+sorted[n/2])/2);
    correctValue=med;
    q='Calcula la mediana de: '+dades.join(', ')+' (n='+n+')';
    guide=['Ordena les dades de menor a major: '+sorted.join(', ')];
    solution=guide.concat(['✅ Mediana = '+med]);
  } else {
    var nVals2=rnd(3,5),usedVals2=new Set();
    while(usedVals2.size<nVals2)usedVals2.add(rnd(1,12));
    var vals2=[...usedVals2].sort((a,b)=>a-b);
    var freqs2=vals2.map(()=>rnd(1,5));
    var N2=freqs2.reduce((a,b)=>a+b,0);
    var cum2=[],c2=0;
    for(var i=0;i<vals2.length;i++){c2+=freqs2[i];cum2.push(c2);}
    function valAtPos(pos){for(var j=0;j<cum2.length;j++){if(pos<=cum2[j])return vals2[j];}return vals2[vals2.length-1];}
    var med2=N2%2===1?valAtPos((N2+1)/2):round2((valAtPos(N2/2)+valAtPos(N2/2+1))/2);
    correctValue=med2;
    q='Observa la taula de freqüències. Calcula la mediana.';
    visual=freqTableHtml(vals2,freqs2,'Valor','Freqüència','F. acumulada',cum2);
    guide=['N (total) = '+N2,'Localitza la posició central a la fila de freqüència acumulada'];
    solution=guide.concat(['✅ Mediana = '+med2]);
  }
  return {kind:'numeric',checkType:'decimal',correctValue:correctValue,question:q,visual:visual,guide:guide,solution:solution};
}
function genModaLliureNumeric(){
  var distinctVals=shuffle(Array.from({length:6},(_,i)=>i+2)).slice(0,4);
  var modeVal=distinctVals[0];
  var freqsArr=[rnd(3,5)].concat(distinctVals.slice(1).map(()=>rnd(1,2)));
  var dades=[];
  distinctVals.forEach((v,i)=>{for(var k=0;k<freqsArr[i];k++)dades.push(v);});
  dades=shuffle(dades);
  var q='Quina és la moda de les dades: '+dades.join(', ')+'?';
  var guide=['La moda és el valor que apareix més vegades','Compta les repeticions de cada valor diferent'];
  var solution=['Freqüències: '+distinctVals.map((v,i)=>v+'→'+freqsArr[i]+' cops').join(', '),'✅ Moda = '+modeVal];
  return {kind:'numeric',checkType:'decimal',correctValue:modeVal,question:q,guide:guide,solution:solution};
}
function genModaLliureText(){
  var pool=['Blau','Vermell','Verd','Groc','Taronja'];
  var catsM=shuffle(pool).slice(0,4);
  var winnerIdx=rnd(0,3);
  var freqsM=catsM.map((c,i)=>i===winnerIdx?rnd(4,8):rnd(1,3));
  var q='Observa la taula de freqüències qualitatives. Quina és la moda? Escriu el nom de la categoria.';
  var visual=freqTableHtml(catsM,freqsM,'Categoria','Freqüència');
  var guide=['La moda per a dades qualitatives és la categoria amb més freqüència'];
  var solution=guide.concat(['✅ Moda = '+catsM[winnerIdx]]);
  return {kind:'text',correctText:catsM[winnerIdx],question:q,visual:visual,guide:guide,solution:solution};
}
function genModaLliure(){return rnd(1,2)===1?genModaLliureNumeric():genModaLliureText();}
function genFreqLliure(){
  var type=rnd(1,3);
  var rangeMax=rnd(4,6),nRaw=rnd(12,20);
  var raw=Array.from({length:nRaw},()=>rnd(1,rangeMax));
  var freqMap={};
  raw.forEach(v=>{freqMap[v]=(freqMap[v]||0)+1;});
  var targetVal=rnd(1,rangeMax);
  var fAbs=freqMap[targetVal]||0;
  if(type===1){
    var q='Aquestes són les notes (de 1 a '+rangeMax+') de '+nRaw+' alumnes: '+raw.join(', ')+'. Quina és la freqüència absoluta del valor '+targetVal+'?';
    var guide=['Compta quantes vegades apareix el valor '+targetVal+' a la llista'];
    return {kind:'numeric',checkType:'decimal',correctValue:fAbs,question:q,guide:guide,solution:guide.concat(['✅ Freqüència absoluta = '+fAbs])};
  } else if(type===2){
    var fRel=round2(fAbs/nRaw);
    var q='Aquestes són les notes (de 1 a '+rangeMax+') de '+nRaw+' alumnes: '+raw.join(', ')+'. Quina és la freqüència relativa del valor '+targetVal+'?';
    var guide=['Primer compta la freqüència absoluta: fᵢ = '+fAbs,'hᵢ = fᵢ / N = '+fAbs+' / '+nRaw];
    return {kind:'numeric',checkType:'decimal',correctValue:fRel,question:q,guide:guide,solution:guide.concat(['✅ Freqüència relativa = '+fRel])};
  } else {
    var vals3=[1,2,3,4,5].slice(0,rnd(4,5));
    var freqs3=vals3.map(()=>rnd(2,8));
    var idx3=rnd(1,vals3.length-1);
    var acum=freqs3.slice(0,idx3+1).reduce((a,b)=>a+b,0);
    var q='Observa la taula de freqüències. Calcula la freqüència acumulada fins al valor '+vals3[idx3]+'.';
    var visual=freqTableHtml(vals3,freqs3);
    var guide=['Fᵢ = f₁ + f₂ + ... + fᵢ','Suma les freqüències des del principi fins al valor '+vals3[idx3]];
    return {kind:'numeric',checkType:'decimal',correctValue:acum,question:q,visual:visual,guide:guide,solution:guide.concat(['✅ Freqüència acumulada = '+acum])};
  }
}
function genProbLliure(){
  var type=rnd(1,4);
  if(type===1){
    var cares=6,favorable=rnd(1,3);
    var event=favorable===1?'un nombre parell (2,4,6)':'un nombre major que '+(cares-favorable);
    var cf=favorable===1?3:favorable;
    var q='Llancem un dau de 6 cares. Quina és la probabilitat de treure '+event+'? (fracció com 3/6 o decimal)';
    var guide=['Espai mostral: 6 casos possibles','Casos favorables: '+cf];
    return {kind:'numeric',checkType:'fraction',correctValue:cf/cares,question:q,guide:guide,solution:guide.concat(['✅ P = '+cf+'/'+cares+' = '+frac(cf,cares)])};
  } else if(type===2){
    var total=rnd(8,15),vermelles=rnd(2,total-3),blaves=rnd(1,total-vermelles-1),verdes=total-vermelles-blaves;
    var q='En una bossa hi ha '+vermelles+' boles vermelles, '+blaves+' blaves i '+verdes+' verdes. Quina és la probabilitat de treure una bola VERMELLA?';
    var guide=['Total de boles: '+total,'Casos favorables (vermelles): '+vermelles];
    return {kind:'numeric',checkType:'fraction',correctValue:vermelles/total,question:q,guide:guide,solution:guide.concat(['✅ P = '+vermelles+'/'+total+' = '+frac(vermelles,total)])};
  } else if(type===3){
    var totalC=rnd(10,20),fav=rnd(2,totalC-2);
    var q='La probabilitat que plogui demà és '+frac(fav,totalC)+'. Quina és la probabilitat que NO plogui?';
    var guide=['P(no ploure) = 1 − P(ploure)'];
    return {kind:'numeric',checkType:'fraction',correctValue:(totalC-fav)/totalC,question:q,guide:guide,solution:guide.concat(['✅ P(no ploure) = '+frac(totalC-fav,totalC)])};
  } else {
    var pals=['Oros','Copes','Espases','Bastos'],pal=pals[rnd(0,3)];
    var q='En una baralla espanyola de 40 cartes (4 pals de 10). Quina és la probabilitat de treure una carta del pal d\''+pal+'?';
    var guide=['Total de cartes: 40','Cartes del pal d\''+pal+': 10'];
    return {kind:'numeric',checkType:'fraction',correctValue:0.25,question:q,guide:guide,solution:guide.concat(['✅ P = 10/40 = 1/4 = 0,25'])};
  }
}

function hasCloudStorage(){return(typeof window.storage!=='undefined')&&window.storage&&typeof window.storage.get==='function';}
async function loadState(){
  try{
    if(hasCloudStorage()){
      var r=await window.storage.get('progress_construccio',false);
      if(r&&r.value){var s=JSON.parse(r.value);if(s.unlocked)state.unlocked=s.unlocked;if(s.done)state.done=s.done;}
    } else {
      var raw=localStorage.getItem('construccio_1eso_progress');
      if(raw){var s2=JSON.parse(raw);if(s2.unlocked)state.unlocked=s2.unlocked;if(s2.done)state.done=s2.done;}
    }
  }catch(e){}
}
async function saveState(){
  try{
    if(hasCloudStorage())await window.storage.set('progress_construccio',JSON.stringify({unlocked:state.unlocked,done:state.done}),false);
    else localStorage.setItem('construccio_1eso_progress',JSON.stringify({unlocked:state.unlocked,done:state.done}));
  }catch(e){console.error('Error desant el progrés:',e);}

function runAutoTest(){
  var REPS=150,results=[];
  TOPICS.forEach(function(t){
    var bugs=[];
    for(var i=0;i<REPS;i++){
      var ex;
      try{ex=t.gen();}catch(e){bugs.push('gen() crash: '+e.message);continue;}
      if(!ex){bugs.push('exercici buit');continue;}
      if(ex.kind==='construct'){
        if(!ex.target||ex.target.length!==ex.labels.length)bugs.push('target/labels longitud no coincideix');
        if(ex.target.some(v=>v<0||v>ex.maxScale||!Number.isFinite(v)))bugs.push('target fora de rang: '+ex.target.join(','));
      } else if(ex.kind==='pie'){
        var sum=ex.target.reduce((a,b)=>a+b,0);
        if(Math.abs(sum-360)>2)bugs.push('suma de graus no és 360: '+sum);
      } else if(ex.kind==='numeric'){
        if(typeof ex.correctValue!=='number'||!Number.isFinite(ex.correctValue))bugs.push('correctValue invàlid: '+ex.correctValue);
      } else if(ex.kind==='text'){
        if(!ex.correctText)bugs.push('correctText buit');
      }
    }
    results.push({name:t.name,ok:REPS-bugs.length,total:REPS,bugs:bugs.slice(0,10)});
  });
  var totalBugs=results.reduce((s,r)=>s+r.bugs.length,0);
  var html='<div style="padding:18px;max-width:680px;margin:0 auto">'
    +'<h2 style="color:var(--primary);margin-bottom:4px">🧪 Test Automàtic</h2>'
    +'<p style="color:var(--muted);font-size:0.85rem;margin-bottom:18px">'+REPS+' exercicis per tema</p>';
  results.forEach(function(r){
    var pct=Math.round(r.ok/r.total*100);
    var color=pct===100?'var(--success)':pct>=90?'var(--warn)':'var(--error)';
    html+='<div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow)">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><b style="font-size:0.95rem">'+r.name+'</b><span style="color:'+color+';font-weight:700">'+pct+'% ('+r.ok+'/'+r.total+')</span></div>';
    if(r.bugs.length>0){
      html+='<details><summary style="font-size:0.82rem;color:var(--error);cursor:pointer">'+r.bugs.length+' error(s)</summary><div style="margin-top:8px;font-size:0.78rem;line-height:1.8;color:#a02020;background:#fdeaea;border-radius:8px;padding:10px">'+r.bugs.map((b,i)=>'<div style="border-bottom:1px solid #f0b0b0;padding:3px 0"><b>#'+(i+1)+'</b> '+b+'</div>').join('')+'</div></details>';
    } else html+='<div style="font-size:0.82rem;color:var(--success)">✅ Cap error detectat</div>';
    html+='</div>';
  });
  html+='<div style="text-align:center;padding:16px;background:'+(totalBugs===0?'#e6f9ef':'#fdeaea')+';border-radius:12px;margin-top:4px"><b style="font-size:1.1rem;color:'+(totalBugs===0?'var(--success)':'var(--error)')+'">'+(totalBugs===0?'🏆 Tot correcte!':'⚠️ '+totalBugs+' bugs trobats')+'</b></div>';
  html+='<button onclick="downloadReport()" style="margin-top:14px;width:100%;background:#8b5cf6;color:white;border:none;border-radius:12px;padding:13px;font-size:0.93rem;font-weight:600;cursor:pointer">⬇️ Descarregar informe .txt</button>';
  html+='<button onclick="showHome()" style="margin-top:10px;width:100%;background:var(--primary);color:white;border:none;border-radius:12px;padding:13px;font-size:0.93rem;font-weight:600;cursor:pointer">← Tornar al menú</button></div>';
  window._lastTestResults=results;
  document.getElementById('navBack').style.display='none';
  document.getElementById('navTitle').textContent='🧪 Test Automàtic';
  showScreen('screenTest');
  document.getElementById('testContent').innerHTML=html;
}
function downloadReport(){
  var results=window._lastTestResults||[];
  var totalBugs=results.reduce((s,r)=>s+r.bugs.length,0);
  var lines=['INFORME DE TEST AUTOMÀTIC — Construeix i Calcula · 1r ESO','='.repeat(60),'Data: '+new Date().toLocaleString('ca-ES'),'150 exercicis per tema | Total bugs: '+totalBugs,''];
  results.forEach(function(r){
    var pct=Math.round(r.ok/r.total*100);
    lines.push('-'.repeat(60),'TEMA: '+r.name,'Resultat: '+pct+'% ('+r.ok+'/'+r.total+')');
    if(r.bugs.length===0)lines.push('✓ Cap error detectat');
    else{lines.push('✗ '+r.bugs.length+' error(s):');r.bugs.forEach((b,i)=>lines.push('  #'+(i+1)+' '+b));}
    lines.push('');
  });
  lines.push('='.repeat(60),totalBugs===0?'RESULTAT FINAL: TOT CORRECTE ✓':'RESULTAT FINAL: '+totalBugs+' BUGS TROBATS ✗');
  var blob=new Blob([lines.join('\n')],{type:'text/plain;charset=utf-8'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='informe_test_construccio.txt';a.click();
}

var navClicks=0,navTimer=null;
document.getElementById('navTitle').addEventListener('click',function(){
  navClicks++;clearTimeout(navTimer);navTimer=setTimeout(()=>{navClicks=0;},600);
  if(navClicks>=3){navClicks=0;runAutoTest();}
});

(async function init(){
  document.getElementById('topicsGrid').innerHTML='<p style="text-align:center;color:var(--muted);padding:24px;font-size:0.85rem">Carregant el teu progrés...</p>';
  await loadState();
  showHome();
})();
</script>
